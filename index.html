<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>アトリエやまと｜スケジュール</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F2EA;--sd:rgba(180,148,110,.38);--sl:rgba(255,255,255,.9);
  --tan:#C08B5C;--brown:#3D2B1A;--mu:#9C7E5F;
  --lesson:#2E7D52;--lesson-bg:rgba(46,125,82,.12);
  --personal:#7B5EA7;--personal-bg:rgba(123,94,167,.1);
  --closed:#B03A2E;--closed-bg:rgba(176,58,46,.09);
  --free:#8B6914;--free-bg:rgba(210,175,80,.14);
  --today-c:#C08B5C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'M PLUS Rounded 1c',sans-serif;color:var(--brown)}
body{max-width:480px;margin:0 auto;padding-bottom:80px;min-height:100vh}

/* ===== ヘッダー ===== */
.hd{position:sticky;top:0;z-index:100;background:var(--bg);
  padding:14px 16px 0;box-shadow:0 4px 16px rgba(180,148,110,.13)}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-name{font-size:12px;font-weight:700;color:var(--mu);letter-spacing:.06em}
.view-tabs{display:flex;gap:4px;background:var(--bg);
  box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl);
  border-radius:9999px;padding:3px}
.vtab{border:none;background:none;cursor:pointer;padding:5px 13px;border-radius:9999px;
  font-size:11.5px;font-weight:700;color:var(--mu);transition:all .18s;font-family:inherit}
.vtab.active{background:var(--tan);color:#fff;
  box-shadow:3px 3px 8px var(--sd),-2px -2px 6px var(--sl)}
.nav-row{display:flex;align-items:center;justify-content:space-between;
  padding-bottom:12px;gap:8px}
.nbtn{background:var(--bg);border:none;cursor:pointer;width:36px;height:36px;border-radius:50%;
  box-shadow:4px 4px 10px var(--sd),-3px -3px 8px var(--sl);
  font-size:14px;color:var(--brown);display:flex;align-items:center;justify-content:center;
  transition:all .18s;flex-shrink:0}
.nbtn:active{box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl);transform:scale(.95)}
.period-label{font-size:15px;font-weight:800;color:var(--brown);text-align:center;flex:1}

/* ===== ローディング ===== */
.loading{text-align:center;padding:52px 20px}
.spin{width:28px;height:28px;border:3px solid rgba(192,139,92,.2);border-top-color:var(--tan);
  border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading p{font-size:12px;color:var(--mu)}
.err-box{margin:20px 14px;padding:16px;border-radius:14px;background:var(--closed-bg);text-align:center}
.err-box p{font-size:12.5px;color:var(--closed);line-height:1.8}
.rbtn{margin-top:10px;background:var(--bg);border:none;cursor:pointer;padding:7px 16px;
  border-radius:9999px;font-size:12px;font-weight:700;color:var(--tan);
  box-shadow:3px 3px 8px var(--sd),-2px -2px 6px var(--sl);font-family:inherit}

/* ===== 月表示 ===== */
#view-month{padding:12px 12px 0}
.month-wds{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:4px}
.mwd{text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:4px 0}
.mwd.s{color:#c0392b}.mwd.sa{color:#2E7A94}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.mcell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;cursor:pointer;position:relative;
  transition:all .15s;font-size:13px;font-weight:700}
.mcell.emp{visibility:hidden}
.mcell.today-cell{outline:2.5px solid var(--tan);outline-offset:-2px}
.mcell.has-closed{background:var(--closed-bg);color:var(--closed)}
.mcell.has-events:not(.has-closed){background:var(--lesson-bg);color:var(--lesson)}
.mcell.no-events{color:rgba(61,43,26,.3)}
.mcell.sun-c:not(.has-events):not(.has-closed){color:#c0392b}
.mcell.sat-c:not(.has-events):not(.has-closed){color:#2E7A94}
.mcell.selected-cell{box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl) !important;
  outline:2px solid var(--tan) !important}
.mcell .mdot-wrap{display:flex;gap:2px;position:absolute;bottom:3px}
.mdot{width:4px;height:4px;border-radius:50%}

/* 月表示の日別詳細パネル */
.month-detail{margin-top:10px;border-radius:18px;overflow:hidden;
  box-shadow:4px 4px 12px var(--sd),-3px -3px 9px var(--sl)}
.md-header{padding:12px 16px;background:var(--tan);color:#fff;
  font-size:13px;font-weight:800}
.md-body{padding:12px 14px;background:var(--bg)}
.md-empty{font-size:12.5px;color:var(--mu);padding:8px 0}

/* ===== 週表示 ===== */
#view-week{padding:10px 10px 0;overflow-x:auto}
/* 週表示ラッパー */
.week-wrap{padding:10px 8px 0;overflow-x:auto;overflow-y:visible}
.week-outer{display:flex;flex-direction:column;min-width:320px}

/* 曜日ヘッダー行 */
.wg-header{display:flex;margin-left:32px;gap:1px;margin-bottom:2px}
.wg-daycol{flex:1;text-align:center;padding:5px 2px}
.wg-dow{font-size:10px;font-weight:700;color:var(--mu)}
.wg-dnum{font-size:14px;font-weight:800;color:var(--brown);line-height:1.3}
.wg-daycol.today-col .wg-dnum{background:var(--tan);color:#fff;width:24px;height:24px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;margin:2px auto 0}
.wg-daycol.closed-col{opacity:.5}
.wg-daycol.sun-col .wg-dow,.wg-daycol.sun-col .wg-dnum{color:#c0392b}
.wg-daycol.sat-col .wg-dow,.wg-daycol.sat-col .wg-dnum{color:#2E7A94}

/* タイムライン本体 */
.wg-body{display:flex;flex:1}

/* 時刻ラベル列 */
.wg-times{width:32px;flex-shrink:0;position:relative}
.wg-time-label{position:absolute;right:4px;font-size:9px;font-weight:700;color:var(--mu);
  transform:translateY(-50%);line-height:1;white-space:nowrap}

/* 日列グリッド */
.wg-cols{display:flex;flex:1;gap:1px;position:relative}
.wg-col{flex:1;position:relative;border-left:1px solid rgba(192,139,92,.08)}

/* 時間線（横線） */
.wg-hline{position:absolute;left:0;right:0;border-top:1px solid rgba(192,139,92,.1);pointer-events:none}

/* 休業日背景 */
.wg-closed-bg{position:absolute;inset:0;background:var(--closed-bg);opacity:.6;pointer-events:none;
  display:flex;align-items:center;justify-content:center}
.wg-closed-label{font-size:9px;font-weight:700;color:var(--closed);writing-mode:vertical-rl;
  letter-spacing:.1em}

/* 予定ブロック（絶対配置） */
.wg-ev{position:absolute;left:1px;right:1px;border-radius:6px;padding:2px 4px;
  overflow:hidden;font-size:9.5px;font-weight:700;line-height:1.3;cursor:default;
  box-sizing:border-box}
.wg-ev.lesson{background:var(--lesson-bg);color:var(--lesson);border-left:2px solid var(--lesson)}
.wg-ev.personal{background:var(--personal-bg);color:var(--personal);border-left:2px solid var(--personal)}
.wg-ev .ev-t{font-size:8.5px;opacity:.7;display:block}
.wg-ev .ev-n{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
/* 空き時間ブロック */
.wg-free{position:absolute;left:1px;right:1px;border-radius:6px;
  background:var(--free-bg);border-left:2px dashed rgba(139,105,20,.3);
  display:flex;align-items:center;justify-content:center;pointer-events:none}
.wg-free-label{font-size:8px;font-weight:700;color:var(--free);opacity:.6;writing-mode:vertical-rl;letter-spacing:.05em}

/* ===== 日表示 ===== */
#view-day{padding:12px 14px 0}
/* 曜日タブ */
.day-tabs{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.dtab{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 2px;border-radius:12px;cursor:pointer;border:none;background:none;
  transition:all .18s;font-family:inherit}
.dtab .dt-dow{font-size:10px;font-weight:700;color:var(--mu)}
.dtab .dt-num{font-size:15px;font-weight:800;color:var(--brown);line-height:1}
.dtab.sun .dt-dow,.dtab.sun .dt-num{color:#c0392b}
.dtab.sat .dt-dow,.dtab.sat .dt-num{color:#2E7A94}
.dtab.active{background:var(--tan);box-shadow:3px 3px 8px var(--sd),-2px -2px 6px var(--sl)}
.dtab.active .dt-dow,.dtab.active .dt-num{color:#fff}
.dtab.today-dt .dt-num{background:var(--tan);color:#fff;width:26px;height:26px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;font-size:13px}
.dtab.active.today-dt .dt-num{background:rgba(255,255,255,.35)}
.dtab.closed-dt{opacity:.55}
.cdot{width:4px;height:4px;border-radius:50%;background:var(--closed)}
.dtab.active .cdot{background:#fff}

.day-status{padding:10px 14px;border-radius:12px;display:flex;align-items:center;gap:8px;
  margin-bottom:12px;font-size:13px;font-weight:700}
.day-status.open{background:var(--lesson-bg);color:var(--lesson)}
.day-status.closed{background:var(--closed-bg);color:var(--closed)}
.ds-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:currentColor}

.timeline{position:relative;padding-left:44px}
.tl-line{position:absolute;left:20px;top:0;bottom:0;width:2px;
  background:linear-gradient(to bottom,transparent,rgba(192,139,92,.18) 5%,rgba(192,139,92,.18) 95%,transparent)}
.tslot{position:relative;margin-bottom:8px}
.tlabel{position:absolute;left:-44px;top:50%;transform:translateY(-50%);
  font-size:10px;font-weight:700;color:var(--mu);width:38px;text-align:right}
.ev-card{border-radius:13px;padding:10px 13px;
  box-shadow:3px 3px 9px var(--sd),-2px -2px 6px var(--sl);
  animation:slin .2s ease}
@keyframes slin{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:translateY(0)}}
.ev-card.lesson{background:var(--lesson-bg);border-left:3px solid var(--lesson)}
.ev-card.personal{background:var(--personal-bg);border-left:3px solid var(--personal)}
.ev-card.closed{background:var(--closed-bg);border-left:3px solid var(--closed)}
.ev-time{font-size:10.5px;font-weight:700;opacity:.7;margin-bottom:2px}
.ev-title{font-size:13px;font-weight:800;line-height:1.3}
.ev-card.lesson .ev-time,.ev-card.lesson .ev-title{color:var(--lesson)}
.ev-card.personal .ev-time,.ev-card.personal .ev-title{color:var(--personal)}
.ev-card.closed .ev-time,.ev-card.closed .ev-title{color:var(--closed)}
.empty-day{text-align:center;padding:40px 20px}
/* 日表示空きスロット */
.free-slot{border-radius:13px;padding:10px 13px;margin-bottom:8px;
  background:var(--free-bg);border-left:3px dashed rgba(139,105,20,.35);
  display:flex;align-items:center;gap:10px}
.free-slot .fs-time{font-size:12px;font-weight:700;color:var(--free)}
.free-slot .fs-label{font-size:11px;font-weight:600;color:var(--free);opacity:.7}
.free-dot{width:7px;height:7px;border-radius:50%;background:var(--free);opacity:.5;flex-shrink:0}
.empty-day .icon{font-size:32px;margin-bottom:10px}
.empty-day p{font-size:12.5px;color:var(--mu);line-height:1.8}

/* 凡例 */
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  padding:14px;margin:16px 14px 0;
  box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl);border-radius:16px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--mu)}
.ld{width:8px;height:8px;border-radius:50%}
.sync{text-align:center;font-size:10px;color:rgba(156,126,95,.4);padding:8px 0 0}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-top">
    <div class="app-name">🎨 アトリエやまと スケジュール</div>
    <div class="view-tabs">
      <button class="vtab" id="vt-month" onclick="setView('month')">月</button>
      <button class="vtab" id="vt-week"  onclick="setView('week')">週</button>
      <button class="vtab active" id="vt-day" onclick="setView('day')">日</button>
    </div>
  </div>
  <div class="nav-row">
    <button class="nbtn" id="btn-prev">◀</button>
    <div class="period-label" id="period-label">---</div>
    <button class="nbtn" id="btn-next">▶</button>
  </div>
</div>

<div id="view-month" style="display:none"></div>
<div id="view-week"  style="display:none"></div>
<div id="view-day"   style="display:none"></div>

<div id="legend-area">
  <div class="legend">
    <div class="li"><div class="ld" style="background:var(--lesson)"></div>授業・教室</div>
    <div class="li"><div class="ld" style="background:var(--personal)"></div>各種業務など</div>
    <div class="li"><div class="ld" style="background:var(--closed)"></div>休業日</div>
  </div>
  <p class="sync">※ Googleカレンダーと自動同期</p>
</div>

<script>
// =============================================
// 設定
// =============================================
const GAS = 'https://script.google.com/macros/s/AKfycbyCyQRvex2hkr899np_SryVq7GhEFlqFiHNebdnleh0znn6FLfMk7TPLaFC3rFPmcnvqQ/exec';
const CACHE_KEY   = 'atelier_events_v2';
const CACHE_META  = 'atelier_cache_meta_v2';
const TTL_DAILY   = 24*60*60*1000;   // 1日
const TTL_WEEKLY  = 7*24*60*60*1000; // 7日

// =============================================
// 状態
// =============================================
let currentView = 'day';
let offset = 0;
let selectedDateKey = null;
let allEvents = {}; // "YYYY-MM-DD" → [{type,title,time,allDay,sort}]
let dataReady = false;

// =============================================
// ユーティリティ
// =============================================
const pad = n => String(n).padStart(2,'0');
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayKey = () => dateKey(new Date());
const fmtTime = d => d ? `${pad(d.getHours())}:${pad(d.getMinutes())}` : '';

function addMonths(d, n){
  const r = new Date(d);
  r.setMonth(r.getMonth() + n);
  return r;
}

// =============================================
// ローカルストレージ キャッシュ操作
// =============================================
function saveCacheEvents(evMap){
  try {
    localStorage.setItem(CACHE_KEY, JSON.stringify(evMap));
  } catch(e){ console.warn('cache save failed', e); }
}

function loadCacheEvents(){
  try {
    const s = localStorage.getItem(CACHE_KEY);
    return s ? JSON.parse(s) : {};
  } catch(e){ return {}; }
}

function getMeta(){
  try {
    const s = localStorage.getItem(CACHE_META);
    return s ? JSON.parse(s) : {};
  } catch(e){ return {}; }
}

function saveMeta(meta){
  try {
    localStorage.setItem(CACHE_META, JSON.stringify(meta));
  } catch(e){}
}

// =============================================
// GAS JSON 取得（type=all で3カレンダー一括）
// =============================================
async function fetchAllEvents(year, month, months=1){
  const url = `${GAS}?type=all&year=${year}&month=${month}&months=${months}`;
  const r = await fetch(url, {signal: AbortSignal.timeout(30000)});
  if(!r.ok) throw new Error(`fetch error ${r.status}`);
  const data = await r.json();
  // {lesson:[...], personal:[...], closed:[...]} の形式
  if(typeof data !== 'object' || Array.isArray(data)) throw new Error('invalid response');
  return data;
}

// =============================================
// イベントデータをallEventsマップに追記
// =============================================
function mergeEvents(evList, calType, map){
  for(const ev of evList){
    if(!ev.start) continue;
    const s = parseDateTime(ev.start);
    const e = ev.end ? parseDateTime(ev.end) : null;
    if(!s) continue;

    let title = ev.title || '';
    let type  = calType;
    if(type==='personal') title = '各種業務・出張・私用など';
    if(type==='closed')   title = '🔴 休業日';

    const isAllDay = ev.allDay;
    const timeStr = isAllDay ? '' : `${fmtTime(s)}${e ? '〜'+fmtTime(e) : ''}`;
    const sortN   = isAllDay ? -1 : s.getHours()*60 + s.getMinutes();
    const k = dateKey(s);

    if(!map[k]) map[k] = [];
    // 重複チェック（同タイトル・同時刻）
    const dup = map[k].some(x => x.title===title && x.time===timeStr);
    if(!dup) map[k].push({type, title, time:timeStr, allDay:isAllDay, sort:sortN});

    // 終日イベントの複数日展開
    // Google Calendar APIのend日付は「翌日」なので実質終了日はe-1日
    // 1日だけのイベントはs==e-1日なので展開しない
    if(isAllDay && e){
      const eAdj = new Date(e.getFullYear(), e.getMonth(), e.getDate() - 1);
      if(eAdj > s){
        let d2 = new Date(s.getFullYear(), s.getMonth(), s.getDate()+1);
        while(d2 <= eAdj){
          const k2 = dateKey(d2);
          if(!map[k2]) map[k2] = [];
          const dup2 = map[k2].some(x => x.title===title && x.allDay);
          if(!dup2) map[k2].push({type, title, time:'', allDay:true, sort:-1});
          d2.setDate(d2.getDate()+1);
        }
      }
    }
  }
}

function parseDateTime(str){
  if(!str) return null;
  // 2026-05-08T13:00:00+09:00 or 2026-05-08
  const d = new Date(str);
  return isNaN(d) ? null : d;
}

function sortMap(map){
  for(const k in map) map[k].sort((a,b) => a.sort - b.sort);
}

// =============================================
// 3段階キャッシュ戦略でデータ取得
// =============================================
async function loadData(forceRefresh = false){
  const now   = Date.now();
  const meta  = getMeta();
  const today = new Date();
  const year  = today.getFullYear();
  const month = today.getMonth() + 1;

  // --- キャッシュ読み込み ---
  const cached = loadCacheEvents();
  if(Object.keys(cached).length > 0 && !forceRefresh){
    allEvents = cached;
    dataReady = true;
  }

  const isFirstTime  = !meta.firstFetch;
  const needWeekly   = !meta.weeklyFetch  || (now - meta.weeklyFetch)  > TTL_WEEKLY;
  const needDaily    = !meta.dailyFetch   || (now - meta.dailyFetch)   > TTL_DAILY;

  if(isFirstTime || forceRefresh){
    // ===== 初回：今年度4月〜翌年3月を3ヶ月ずつ分割取得 =====
    const fyYear  = month >= 4 ? year : year - 1;
    const map = {};
    // 4ブロックに分けて取得（4〜6月、7〜9月、10〜12月、1〜3月）
    const blocks = [
      {y: fyYear,   m: 4,  n: 3},
      {y: fyYear,   m: 7,  n: 3},
      {y: fyYear,   m: 10, n: 3},
      {y: fyYear+1, m: 1,  n: 3},
    ];
    for(let i=0; i<blocks.length; i++){
      const b = blocks[i];
      showSyncBadge(`初回データを取得中… ${i+1}/4`);
      try {
        const data = await fetchAllEvents(b.y, b.m, b.n);
        Object.entries(data).forEach(([calType, evs]) => mergeEvents(evs, calType, map));
        // 途中経過をキャッシュに保存（途中でも使えるように）
        sortMap(map);
        allEvents = {...cached, ...map};
        saveCacheEvents(allEvents);
        dataReady = true;
        if(i===0) render(); // 最初のブロック取得後すぐ表示
      } catch(e) {
        console.warn(`block ${i+1} failed`, e);
      }
    }
    meta.firstFetch = now;
    meta.weeklyFetch = now;
    meta.dailyFetch = now;
    saveMeta(meta);
    hideSyncBadge();
    render();

  } else if(needWeekly){
    // ===== 週次：過去1ヶ月＋今後3ヶ月 =====
    if(dataReady) render();
    showSyncBadge('週次更新中…');
    const map = {...allEvents};
    const wkStart = addMonths(today, -1);
    const wkData = await fetchAllEvents(wkStart.getFullYear(), wkStart.getMonth()+1, 4);
    Object.entries(wkData).forEach(([calType, evs]) => mergeEvents(evs, calType, map));
    sortMap(map);
    allEvents = map;
    saveCacheEvents(allEvents);
    meta.weeklyFetch = now;
    meta.dailyFetch = now;
    saveMeta(meta);
    hideSyncBadge();
    render();

  } else if(needDaily){
    // ===== 日次：過去1ヶ月＋当月1ヶ月分 =====
    if(dataReady) render();
    showSyncBadge('本日分を更新中…');
    const map = {...allEvents};
    const dlStart = addMonths(today, -1);
    const dlData = await fetchAllEvents(dlStart.getFullYear(), dlStart.getMonth()+1, 2);
    Object.entries(dlData).forEach(([calType, evs]) => mergeEvents(evs, calType, map));
    sortMap(map);
    allEvents = map;
    saveCacheEvents(allEvents);
    meta.dailyFetch = now;
    saveMeta(meta);
    hideSyncBadge();
    render();

  } else {
    // ===== 通常：キャッシュ即表示 → バックグラウンドで今日から3週間分取得 =====
    if(dataReady) render();
    setTimeout(async ()=>{
      try {
        showSyncBadge('最新を確認中…');
        const map = {...allEvents};
        const need2months = today.getDate() > 10;
        const bgData = await fetchAllEvents(year, month, need2months ? 2 : 1);
        Object.entries(bgData).forEach(([calType, evs]) => mergeEvents(evs, calType, map));
        sortMap(map);
        allEvents = map;
        saveCacheEvents(allEvents);
        hideSyncBadge();
        render();
      } catch(e){ hideSyncBadge(); console.warn('bg fetch failed', e); }
    }, 100);
  }
}

// =============================================
// 同期バッジ
// =============================================
function showSyncBadge(msg){
  let b = document.getElementById('sync-badge');
  if(!b){
    b = document.createElement('div');
    b.id = 'sync-badge';
    b.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(61,43,26,.85);color:#fff;font-size:11px;font-weight:700;padding:7px 16px;border-radius:9999px;z-index:999;font-family:inherit;white-space:nowrap';
    document.body.appendChild(b);
  }
  b.textContent = '🔄 ' + msg;
  b.style.display = '';
}
function hideSyncBadge(){
  const b = document.getElementById('sync-badge');
  if(b) b.style.display = 'none';
}

// =============================================
// ビュー切り替え
// =============================================
function setView(v){
  currentView = v;
  ['month','week','day'].forEach(x => {
    document.getElementById(`view-${x}`).style.display = v===x ? '' : 'none';
    document.getElementById(`vt-${x}`).classList.toggle('active', v===x);
  });
  offset = 0;
  if(dataReady) render();
}

function render(){
  if(!dataReady) return;
  if(currentView==='month')     renderMonth();
  else if(currentView==='week') renderWeek();
  else                          renderDay();
}

// =============================================
// 月表示
// =============================================
function renderMonth(){
  const now = new Date();
  const base = new Date(now.getFullYear(), now.getMonth() + offset, 1);
  const dispY = base.getFullYear(), dispM = base.getMonth();
  document.getElementById('period-label').textContent = `${dispY}年 ${dispM+1}月`;

  const fd  = new Date(dispY, dispM, 1).getDay();
  const dim = new Date(dispY, dispM+1, 0).getDate();
  const tKey = todayKey();
  if(!selectedDateKey) selectedDateKey = tKey;

  const WDS = ['日','月','火','水','木','金','土'];
  let h = `<div id="view-month" style="padding:12px 12px 0">`;
  h += `<div class="month-wds">${WDS.map((w,i)=>`<div class="mwd ${i===0?'s':i===6?'sa':''}">${w}</div>`).join('')}</div>`;
  h += `<div class="month-grid">`;
  for(let i=0;i<fd;i++) h += `<div class="mcell emp"></div>`;
  for(let d=1;d<=dim;d++){
    const dd  = new Date(dispY, dispM, d);
    const k   = dateKey(dd);
    const dow = dd.getDay();
    const evs = allEvents[k]||[];
    const hasCl = evs.some(e=>e.type==='closed');
    const hasEv = evs.length>0 && !hasCl;
    const isTd  = k===tKey, isSel = k===selectedDateKey;
    const cls = [
      hasCl?'has-closed':hasEv?'has-events':'no-events',
      dow===0?'sun-c':dow===6?'sat-c':'',
      isTd?'today-cell':'', isSel?'selected-cell':''
    ].join(' ');
    const types = [...new Set(evs.map(e=>e.type))];
    const dots  = types.map(t=>`<div class="mdot" style="background:var(--${t})"></div>`).join('');
    h += `<div class="mcell ${cls}" data-key="${k}" onclick="selectMonthDay('${k}')">${d}<div class="mdot-wrap">${dots}</div></div>`;
  }
  h += `</div>`;
  h += buildMonthDetail(selectedDateKey);
  h += `</div>`;
  document.getElementById('view-month').outerHTML = h;
  document.getElementById('view-month').style.display = '';
}

function buildMonthDetail(k){
  if(!k) return '';
  const evs = allEvents[k]||[];
  const [y,m,d] = k.split('-').map(Number);
  const dow = new Date(y,m-1,d).getDay();
  const label = `${m}月${d}日（${'日月火水木金土'[dow]}）`;
  let body = evs.length===0
    ? `<div class="md-empty">予定なし</div>`
    : evs.map(ev=>`
      <div style="display:flex;align-items:flex-start;gap:8px;padding:6px 0;border-bottom:1px solid rgba(192,139,92,.1)">
        <div style="width:7px;height:7px;border-radius:50%;background:var(--${ev.type});margin-top:4px;flex-shrink:0"></div>
        <div>
          <div style="font-size:12.5px;font-weight:700;color:var(--${ev.type})">${ev.title}</div>
          ${ev.time?`<div style="font-size:10.5px;color:var(--mu)">${ev.time}</div>`:''}
        </div>
      </div>`).join('');
  return `<div class="month-detail"><div class="md-header">${label}</div><div class="md-body">${body}</div></div>`;
}

function selectMonthDay(k){
  selectedDateKey = k;
  const old = document.querySelector('.month-detail');
  if(old) old.outerHTML = buildMonthDetail(k);
  document.querySelectorAll('.mcell').forEach(c=>{
    c.classList.toggle('selected-cell', c.dataset.key===k);
  });
}

// =============================================
// 週表示
// =============================================
function renderWeek(){
  const now = new Date();
  const mon = new Date(now);
  mon.setDate(now.getDate() - now.getDay() + 1 + offset*7);
  const dates = [];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d);}

  const f=dates[0], l=dates[6];
  document.getElementById('period-label').textContent = `${f.getMonth()+1}/${f.getDate()}〜${l.getMonth()+1}/${l.getDate()}`;

  const tKey = todayKey();
  const START_H=9, END_H=22, PPM=1.4;
  const totalMins=(END_H-START_H)*60, totalH=totalMins*PPM;
  const HOURS=Array.from({length:END_H-START_H+1},(_,i)=>START_H+i);
  const DOW=['日','月','火','水','木','金','土'];
  const TW=32;

  function toMins(t){
    if(!t) return null;
    const [h,m]=t.split(':').map(Number);
    return h*60+(m||0)-START_H*60;
  }

  // ヘッダー
  let hdrH = `<div style="display:flex;margin-bottom:2px"><div style="width:${TW}px;flex-shrink:0"></div>`;
  dates.forEach(d=>{
    const k=dateKey(d), dow=d.getDay();
    const evs=allEvents[k]||[];
    const hasCl=evs.some(e=>e.type==='closed'), isTd=k===tKey;
    const dc=dow===0?'sun-col':dow===6?'sat-col':'';
    hdrH+=`<div class="wg-daycol ${dc} ${isTd?'today-col':''} ${hasCl?'closed-col':''}" style="flex:1;min-width:0">
      <div class="wg-dow">${DOW[dow]}</div>
      <div class="wg-dnum">${d.getDate()}</div>
    </div>`;
  });
  hdrH += `</div>`;

  // 時刻列
  let timesH = `<div class="wg-times" style="width:${TW}px;height:${totalH}px;flex-shrink:0;position:relative">`;
  HOURS.forEach(hr=>{ timesH+=`<div class="wg-time-label" style="top:${((hr-START_H)*60)*PPM}px">${hr}:00</div>`; });
  timesH += `</div>`;

  // 日列
  let colsH = `<div class="wg-cols" style="height:${totalH}px;position:relative;flex:1">`;
  HOURS.forEach(hr=>{
    colsH+=`<div style="position:absolute;top:${((hr-START_H)*60)*PPM}px;left:0;right:0;border-top:1px solid rgba(192,139,92,.1);pointer-events:none;z-index:0"></div>`;
  });

  dates.forEach((d,di)=>{
    const k=dateKey(d), evs=allEvents[k]||[];
    const hasCl=evs.some(e=>e.type==='closed');
    const pct=100/7, left=di*pct;
    let colH=`<div class="wg-col" style="position:absolute;top:0;bottom:0;left:${left}%;width:${pct}%;border-left:1px solid rgba(192,139,102,.08)">`;

    if(hasCl){
      colH+=`<div class="wg-closed-bg"><span class="wg-closed-label">休業日</span></div>`;
    } else {
      const timed = evs
        .filter(ev=>!ev.allDay && ev.time && ev.time.includes('〜'))
        .map(ev=>{ const [s,e]=ev.time.split('〜'); return {...ev, startM:toMins(s), endM:toMins(e)||toMins(s)+60}; })
        .filter(ev=>ev.startM!==null && ev.startM>=0 && ev.startM<totalMins)
        .sort((a,b)=>a.startM-b.startM);

      // 空きブロック（13〜21時）
      const OS=(13-START_H)*60, OE=(21-START_H)*60;
      const merged=[];
      timed.forEach(ev=>{
        if(merged.length && ev.startM<=merged[merged.length-1].e)
          merged[merged.length-1].e=Math.max(merged[merged.length-1].e,ev.endM);
        else merged.push({s:ev.startM,e:ev.endM});
      });
      let cur=OS;
      merged.forEach(ev=>{
        if(ev.s-cur>=30){ const top=cur*PPM,ht=(ev.s-cur)*PPM; colH+=`<div class="wg-free" style="top:${top}px;height:${ht}px">${ht>28?'<span class="wg-free-label">空き</span>':''}</div>`; }
        cur=Math.max(cur,ev.e);
      });
      if(OE-cur>=30){ const top=cur*PPM,ht=(OE-cur)*PPM; colH+=`<div class="wg-free" style="top:${top}px;height:${ht}px">${ht>28?'<span class="wg-free-label">空き</span>':''}</div>`; }

      // 予定ブロック
      timed.forEach(ev=>{
        const top=ev.startM*PPM, ht=Math.max((ev.endM-ev.startM)*PPM,18);
        const shortName=ev.type==='personal'?'業務':ev.title.replace(/（.+?）/g,'').slice(0,10);
        const [ts]=ev.time.split('〜');
        colH+=`<div class="wg-ev ${ev.type}" style="top:${top}px;height:${ht}px" title="${ev.title}（${ev.time}）">
          <span class="ev-t">${ts}</span><span class="ev-n">${shortName}</span>
        </div>`;
      });
    }
    colH+=`</div>`;
    colsH+=colH;
  });
  colsH+=`</div>`;

  const h=`<div id="view-week" class="week-wrap">
    <div class="week-outer">
      ${hdrH}
      <div class="wg-body" style="display:flex;position:relative">${timesH}${colsH}</div>
    </div>
  </div>`;
  document.getElementById('view-week').outerHTML=h;
  document.getElementById('view-week').style.display='';
}

// =============================================
// 日表示
// =============================================
function renderDay(){
  const now=new Date();
  const mon=new Date(now);
  mon.setDate(now.getDate()-now.getDay()+1+offset*7);
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d);}

  const f=dates[0],l=dates[6];
  document.getElementById('period-label').textContent=`${f.getMonth()+1}/${f.getDate()}〜${l.getMonth()+1}/${l.getDate()}`;

  const tKey=todayKey();
  if(!selectedDateKey||!dates.find(d=>dateKey(d)===selectedDateKey)){
    selectedDateKey=dates.find(d=>dateKey(d)===tKey)?tKey:dateKey(dates[0]);
  }

  const DS=['日','月','火','水','木','金','土'];
  let tabsH=`<div class="day-tabs">`;
  dates.forEach(d=>{
    const k=dateKey(d),dow=d.getDay(),evs=allEvents[k]||[];
    const hasCl=evs.some(e=>e.type==='closed');
    const isTd=k===tKey,isSel=k===selectedDateKey;
    const dc=dow===0?'sun':dow===6?'sat':'';
    const dot=hasCl&&!isSel?'<div class="cdot"></div>':'';
    tabsH+=`<button class="dtab ${dc} ${isSel?'active':''} ${isTd?'today-dt':''} ${hasCl?'closed-dt':''}" data-key="${k}" onclick="selectDay('${k}')">
      <span class="dt-dow">${DS[dow]}</span><span class="dt-num">${d.getDate()}</span>${dot}
    </button>`;
  });
  tabsH+=`</div>`;

  const evs=allEvents[selectedDateKey]||[];
  const [sy,sm,sdd]=selectedDateKey.split('-').map(Number);
  const sdow=new Date(sy,sm-1,sdd).getDay();
  const hasCl=evs.some(e=>e.type==='closed');
  let statusH=hasCl
    ?`<div class="day-status closed"><div class="ds-dot"></div>休業日</div>`
    :`<div class="day-status open"><div class="ds-dot"></div>${sm}月${sdd}日（${'日月火水木金土'[sdow]}）</div>`;

  // 空き時間計算
  function calcFree(evs){
    const OS=13*60,OE=21*60;
    const fmt=m=>`${pad(Math.floor(m/60))}:${pad(m%60)}`;
    const toM=t=>{ const [h,m]=(t||'').split(':').map(Number); return h*60+(m||0); };
    const timed=evs
      .filter(ev=>!ev.allDay&&ev.time&&ev.time.includes('〜'))
      .map(ev=>{ const [s,e]=ev.time.split('〜'); return {s:toM(s),e:toM(e)||toM(s)+60}; })
      .filter(ev=>ev.s<OE&&ev.e>OS)
      .map(ev=>({s:Math.max(ev.s,OS),e:Math.min(ev.e,OE)}))
      .sort((a,b)=>a.s-b.s);
    const merged=[];
    timed.forEach(ev=>{
      if(merged.length&&ev.s<=merged[merged.length-1].e)
        merged[merged.length-1].e=Math.max(merged[merged.length-1].e,ev.e);
      else merged.push({...ev});
    });
    const gaps=[];let cur=OS;
    merged.forEach(ev=>{ if(ev.s-cur>=30)gaps.push({s:cur,e:ev.s}); cur=Math.max(cur,ev.e); });
    if(OE-cur>=30) gaps.push({s:cur,e:OE});
    return gaps.map(g=>({time:`${fmt(g.s)}〜${fmt(g.e)}`,mins:g.e-g.s,sort:g.s}));
  }

  let bodyH='';
  if(evs.length===0){
    bodyH=`<div class="empty-day"><div class="icon">📭</div><p>この日の予定はありません</p></div>`;
  } else {
    const toM2=t=>{ const [h,m]=(t||'').split(':').map(Number); return h*60+(m||0); };
    const filtEvs=evs.filter(ev=>{
      if(ev.allDay) return true;
      if(!ev.time||!ev.time.includes('〜')) return false;
      const sm=toM2(ev.time.split('〜')[0]);
      return sm>=13*60&&sm<21*60;
    });
    const freeSlots=hasCl?[]:calcFree(filtEvs.filter(e=>!e.allDay));
    bodyH=`<div class="timeline"><div class="tl-line"></div>`;
    const allItems=[
      ...filtEvs.map(ev=>({kind:'ev',ev,sort:ev.allDay?-1:ev.sort})),
      ...freeSlots.map(f=>({kind:'free',f,sort:f.sort}))
    ].sort((a,b)=>a.sort-b.sort);
    allItems.forEach(item=>{
      if(item.kind==='ev'){
        const ev=item.ev;
        const tl=ev.time?`<div class="tlabel">${ev.time.split('〜')[0]}</div>`:'';
        const tm=ev.time?`<div class="ev-time">${ev.time}</div>`:'';
        bodyH+=`<div class="tslot">${tl}<div class="ev-card ${ev.type}">${tm}<div class="ev-title">${ev.title}</div></div></div>`;
      } else {
        const f=item.f;
        const dur=f.mins>=60?`${Math.floor(f.mins/60)}時間${f.mins%60?f.mins%60+'分':''}`:f.mins+'分';
        bodyH+=`<div class="tslot">
          <div class="tlabel" style="color:var(--free);opacity:.7">${f.time.split('〜')[0]}</div>
          <div class="free-slot"><div class="free-dot"></div>
            <div><div class="fs-time">${f.time}</div><div class="fs-label">空き（${dur}）</div></div>
          </div></div>`;
      }
    });
    bodyH+=`</div>`;
  }
  const container=document.getElementById('view-day');
  container.innerHTML=tabsH+statusH+bodyH;
  container.style.display='';
}

function selectDay(k){ selectedDateKey=k; renderDay(); }

// =============================================
// ナビ・起動
// =============================================
document.getElementById('btn-prev').addEventListener('click',()=>{ offset--; render(); });
document.getElementById('btn-next').addEventListener('click',()=>{ offset++; render(); });

// 手動更新ボタン
document.querySelector('.sync').innerHTML += ' <button onclick="forceRefresh()" style="background:none;border:none;cursor:pointer;font-size:10px;color:var(--tan);font-weight:700;text-decoration:underline;font-family:inherit">今すぐ更新</button>';
function forceRefresh(){
  dataReady=false;
  allEvents={};
  localStorage.removeItem(CACHE_KEY);
  localStorage.removeItem(CACHE_META);
  loadData(true).then(()=>{ setView(currentView); });
}

// 起動
setView('day');
loadData();
