<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>アトリエやまと｜スケジュール</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F7F2EA;--sd:rgba(180,148,110,.38);--sl:rgba(255,255,255,.9);
  --tan:#C08B5C;--brown:#3D2B1A;--mu:#9C7E5F;
  --lesson:#2E7D52;--lesson-bg:rgba(46,125,82,.13);
  --personal:#7B5EA7;--personal-bg:rgba(123,94,167,.1);
  --closed:#B03A2E;--closed-bg:rgba(176,58,46,.09);
  --today-c:#C08B5C;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);font-family:'M PLUS Rounded 1c',sans-serif;color:var(--brown)}
body{max-width:520px;margin:0 auto;padding-bottom:80px;min-height:100vh}

/* ヘッダー */
.hd{position:sticky;top:0;z-index:100;background:var(--bg);
  padding:12px 14px 0;box-shadow:0 4px 16px rgba(180,148,110,.13)}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.app-name{font-size:11px;font-weight:700;color:var(--mu);letter-spacing:.06em}
.view-tabs{display:flex;gap:3px;background:var(--bg);
  box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl);
  border-radius:9999px;padding:3px}
.vtab{border:none;background:none;cursor:pointer;padding:5px 12px;border-radius:9999px;
  font-size:11px;font-weight:700;color:var(--mu);transition:all .18s;font-family:inherit}
.vtab.active{background:var(--tan);color:#fff;box-shadow:2px 2px 6px var(--sd)}
.nav-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;gap:8px}
.nbtn{background:var(--bg);border:none;cursor:pointer;width:34px;height:34px;border-radius:50%;
  box-shadow:4px 4px 10px var(--sd),-3px -3px 8px var(--sl);
  font-size:13px;color:var(--brown);display:flex;align-items:center;justify-content:center;
  transition:all .18s;flex-shrink:0}
.nbtn:active{box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl)}
.period-label{font-size:14px;font-weight:800;color:var(--brown);text-align:center;flex:1}

/* ローディング */
.loading{text-align:center;padding:52px 20px}
.spin{width:28px;height:28px;border:3px solid rgba(192,139,92,.2);border-top-color:var(--tan);
  border-radius:50%;animation:sp .7s linear infinite;margin:0 auto 12px}
@keyframes sp{to{transform:rotate(360deg)}}
.loading p{font-size:12px;color:var(--mu)}
.err-box{margin:16px;padding:16px;border-radius:14px;background:var(--closed-bg);text-align:center}
.err-box p{font-size:12.5px;color:var(--closed);line-height:1.8}
.rbtn{margin-top:10px;background:var(--bg);border:none;cursor:pointer;padding:7px 16px;
  border-radius:9999px;font-size:12px;font-weight:700;color:var(--tan);
  box-shadow:3px 3px 8px var(--sd),-2px -2px 6px var(--sl);font-family:inherit}

/* ===== 月表示 ===== */
#view-month{padding:10px 10px 0}
.month-wds{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:3px}
.mwd{text-align:center;font-size:10px;font-weight:700;color:var(--mu);padding:4px 0}
.mwd.s{color:#c0392b}.mwd.sa{color:#2E7A94}
.month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.mcell{border-radius:8px;cursor:pointer;transition:all .15s;padding:3px 2px;min-height:52px;
  display:flex;flex-direction:column;align-items:center}
.mcell.emp{visibility:hidden}
.mcell-num{font-size:12px;font-weight:700;margin-bottom:2px;width:22px;height:22px;
  display:flex;align-items:center;justify-content:center;border-radius:50%}
.mcell.today-cell .mcell-num{background:var(--tan);color:#fff}
.mcell.sun-c .mcell-num{color:#c0392b}
.mcell.sat-c .mcell-num{color:#2E7A94}
.mcell.selected-cell{box-shadow:inset 2px 2px 6px var(--sd),inset -2px -2px 5px var(--sl)}
.mcell-dots{display:flex;gap:2px;flex-wrap:wrap;justify-content:center;padding:0 2px}
.mcell-ev{font-size:8px;font-weight:700;border-radius:3px;padding:1px 3px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;margin-bottom:1px}
.mcell-ev.lesson{background:var(--lesson-bg);color:var(--lesson)}
.mcell-ev.personal{background:var(--personal-bg);color:var(--personal)}
.mcell-ev.closed{background:var(--closed-bg);color:var(--closed)}

/* 月表示の日別詳細 */
.month-detail{margin-top:10px;border-radius:16px;overflow:hidden;
  box-shadow:4px 4px 12px var(--sd),-3px -3px 9px var(--sl)}
.md-header{padding:11px 16px;background:var(--tan);color:#fff;font-size:13px;font-weight:800}
.md-body{padding:10px 14px;background:var(--bg)}
.md-ev{display:flex;align-items:flex-start;gap:8px;padding:6px 0;
  border-bottom:1px solid rgba(192,139,92,.1)}
.md-ev:last-child{border-bottom:none}
.md-dot{width:7px;height:7px;border-radius:50%;margin-top:4px;flex-shrink:0}
.md-title{font-size:12.5px;font-weight:700}
.md-time{font-size:10.5px;color:var(--mu)}
.md-empty{font-size:12px;color:var(--mu);padding:8px 0}

/* ===== 週表示（Googleカレンダー風タイムライン） ===== */
#view-week{padding:0;overflow:hidden}
.week-header{display:flex;border-bottom:1px solid rgba(192,139,92,.15);
  background:var(--bg);position:sticky;top:var(--hd-h,110px);z-index:10}
.wh-time{width:40px;flex-shrink:0}
.wh-day{flex:1;text-align:center;padding:6px 2px;cursor:pointer;border-left:1px solid rgba(192,139,92,.08)}
.wh-dow{font-size:10px;font-weight:700;color:var(--mu)}
.wh-num{font-size:14px;font-weight:800;line-height:1.3}
.wh-day.today-col .wh-num{background:var(--tan);color:#fff;width:24px;height:24px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;margin:2px auto 0}
.wh-day.closed-col{opacity:.55}
.wh-day.sun-col .wh-dow,.wh-day.sun-col .wh-num{color:#c0392b}
.wh-day.sat-col .wh-dow,.wh-day.sat-col .wh-num{color:#2E7A94}

.week-body{display:flex;overflow-y:auto;max-height:calc(100vh - 180px);position:relative}
.week-times{width:40px;flex-shrink:0;position:relative}
.wt-label{position:absolute;right:4px;font-size:9px;font-weight:700;color:var(--mu);
  transform:translateY(-50%);white-space:nowrap}
.week-cols{flex:1;display:flex;position:relative}
.week-hline{position:absolute;left:0;right:0;border-top:1px solid rgba(192,139,92,.1);pointer-events:none}
.week-hline.hour{border-top-color:rgba(192,139,92,.18)}
.wday-col{flex:1;position:relative;border-left:1px solid rgba(192,139,92,.08)}
.wday-closed{position:absolute;inset:0;background:var(--closed-bg);opacity:.5;pointer-events:none;
  display:flex;align-items:center;justify-content:center}
.wday-closed span{font-size:9px;font-weight:700;color:var(--closed);writing-mode:vertical-rl}

/* 週表示の予定ブロック */
.wev{position:absolute;border-radius:5px;padding:2px 4px;overflow:hidden;
  font-size:9.5px;font-weight:700;line-height:1.3;cursor:default;border-left:2px solid}
.wev.lesson{background:var(--lesson-bg);border-color:var(--lesson);color:var(--lesson)}
.wev.personal{background:var(--personal-bg);border-color:var(--personal);color:var(--personal)}
.wev-time{font-size:8px;opacity:.65;display:block}
.wev-name{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ===== 日表示 ===== */
#view-day{padding:10px 12px 0}
.day-tabs{display:grid;grid-template-columns:repeat(7,1fr);gap:3px;margin-bottom:12px}
.dtab{display:flex;flex-direction:column;align-items:center;gap:2px;
  padding:6px 2px;border-radius:12px;cursor:pointer;border:none;background:none;
  transition:all .18s;font-family:inherit}
.dtab .dt-dow{font-size:10px;font-weight:700;color:var(--mu)}
.dtab .dt-num{font-size:15px;font-weight:800;color:var(--brown);line-height:1}
.dtab.sun .dt-dow,.dtab.sun .dt-num{color:#c0392b}
.dtab.sat .dt-dow,.dtab.sat .dt-num{color:#2E7A94}
.dtab.active{background:var(--tan);box-shadow:3px 3px 8px var(--sd),-2px -2px 6px var(--sl)}
.dtab.active .dt-dow,.dtab.active .dt-num{color:#fff}
.dtab.today-dt .dt-num{background:var(--tan);color:#fff;width:26px;height:26px;
  border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px}
.dtab.active.today-dt .dt-num{background:rgba(255,255,255,.35)}
.dtab.closed-dt{opacity:.55}
.cdot{width:4px;height:4px;border-radius:50%;background:var(--closed)}
.dtab.active .cdot{background:#fff}

.day-status{padding:10px 14px;border-radius:12px;display:flex;align-items:center;gap:8px;
  margin-bottom:12px;font-size:13px;font-weight:700}
.day-status.open{background:var(--lesson-bg);color:var(--lesson)}
.day-status.closed{background:var(--closed-bg);color:var(--closed)}
.ds-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;background:currentColor}

/* 日表示タイムライン */
.day-timeline{position:relative}
.day-time-row{display:flex;align-items:flex-start;min-height:32px;
  border-top:1px solid rgba(192,139,92,.08)}
.day-time-row.hour-row{border-top-color:rgba(192,139,92,.2)}
.dtr-label{width:40px;flex-shrink:0;font-size:9px;font-weight:700;color:var(--mu);
  padding-top:4px;text-align:right;padding-right:6px}
.dtr-label.dim{color:rgba(156,126,95,.25)}
.dtr-cards{display:flex;gap:4px;flex:1;flex-wrap:nowrap;overflow-x:auto;
  padding:3px 0 3px 4px;scrollbar-width:none}
.dtr-cards::-webkit-scrollbar{display:none}

/* 日表示カード */
.dcard{border-radius:10px;padding:5px 8px;flex-shrink:0;
  animation:slin .18s ease;position:relative;min-width:58px}
@keyframes slin{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:translateY(0)}}
.dcard.lesson{background:var(--lesson-bg);border-left:3px solid var(--lesson)}
.dcard.personal{background:var(--personal-bg);border-left:3px solid var(--personal);
  flex:none;width:calc(100% - 8px)}
.dcard.closed{background:var(--closed-bg);border-left:3px solid var(--closed);
  flex:none;width:calc(100% - 8px)}
.dcard-initial{font-size:13px;font-weight:800;line-height:1.2}
.dcard-grade{font-size:8.5px;font-weight:600;opacity:.6;margin-top:1px}
.dcard-time{font-size:8px;opacity:.55;display:block;margin-bottom:2px}
.dcard.lesson .dcard-initial{color:var(--lesson)}
.dcard.lesson .dcard-grade{color:var(--lesson)}
.dcard.personal .dcard-initial{color:var(--personal);font-size:11px}
.dcard.closed .dcard-initial{color:var(--closed)}

/* 凡例 */
.legend{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;
  padding:12px;margin:14px 10px 0;
  box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl);border-radius:14px}
.li{display:flex;align-items:center;gap:5px;font-size:10.5px;font-weight:600;color:var(--mu)}
.ld{width:8px;height:8px;border-radius:50%}
.sync-note{text-align:center;font-size:10px;color:rgba(156,126,95,.4);padding:8px 0 0}
</style>
</head>
<body>

<div class="hd">
  <div class="hd-top">
    <div class="app-name">🎨 アトリエやまと スケジュール</div>
    <div class="view-tabs">
      <button class="vtab" id="vt-month" onclick="setView('month')">月</button>
      <button class="vtab" id="vt-week"  onclick="setView('week')">週</button>
      <button class="vtab active" id="vt-day" onclick="setView('day')">日</button>
    </div>
  </div>
  <div class="nav-row">
    <button class="nbtn" id="btn-prev">◀</button>
    <div class="period-label" id="period-label">---</div>
    <button class="nbtn" id="btn-next">▶</button>
  </div>
</div>

<div id="view-month" style="display:none"></div>
<div id="view-week"  style="display:none"></div>
<div id="view-day"   style="display:none"></div>

<div id="legend-area">
  <div class="legend">
    <div class="li"><div class="ld" style="background:var(--lesson)"></div>授業・教室</div>
    <div class="li"><div class="ld" style="background:var(--personal)"></div>各種業務など</div>
    <div class="li"><div class="ld" style="background:var(--closed)"></div>休業日</div>
  </div>
  <p class="sync-note">※ Googleカレンダーと自動同期 <button onclick="forceRefresh()" style="background:none;border:none;cursor:pointer;font-size:10px;color:var(--tan);font-weight:700;text-decoration:underline;font-family:inherit">今すぐ更新</button></p>
</div>

<script>
const GAS = 'https://script.google.com/macros/s/AKfycbyCyQRvex2hkr899np_SryVq7GhEFlqFiHNebdnleh0znn6FLfMk7TPLaFC3rFPmcnvqQ/exec';
const CACHE_KEY  = 'atelier_ev_v3';
const CACHE_META = 'atelier_meta_v3';
const TTL_DAY    = 24*60*60*1000;
const TTL_WEEK   = 7*24*60*60*1000;

let currentView = 'day';
let offset = 0;
let selectedDateKey = null;
let allEvents = {};
let dataReady = false;

// ===== ユーティリティ =====
const pad = n => String(n).padStart(2,'0');
const dateKey = d => `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
const todayKey = () => dateKey(new Date());
const fmtTime = d => d ? `${pad(d.getHours())}:${pad(d.getMinutes())}` : '';
const toM = t => { if(!t)return 0; const [h,m]=(t||'').split(':').map(Number); return h*60+(m||0); };
function addMonths(d,n){ const r=new Date(d); r.setMonth(r.getMonth()+n); return r; }

// ===== キャッシュ =====
function saveCache(map){ try{ localStorage.setItem(CACHE_KEY,JSON.stringify(map)); }catch(e){} }
function loadCache(){ try{ const s=localStorage.getItem(CACHE_KEY); return s?JSON.parse(s):{}; }catch(e){ return {}; } }
function getMeta(){ try{ const s=localStorage.getItem(CACHE_META); return s?JSON.parse(s):{}; }catch(e){ return {}; } }
function saveMeta(m){ try{ localStorage.setItem(CACHE_META,JSON.stringify(m)); }catch(e){} }

// ===== GAS取得 =====
async function fetchAll(year,month,months=1){
  const url=`${GAS}?type=all&year=${year}&month=${month}&months=${months}`;
  const r=await fetch(url,{signal:AbortSignal.timeout(30000)});
  if(!r.ok) throw new Error('fetch error');
  const d=await r.json();
  if(typeof d!=='object'||Array.isArray(d)) throw new Error('invalid');
  return d;
}

// ===== データ統合 =====
function parseDateTime(str){
  if(!str) return null;
  if(/^\d{4}-\d{2}-\d{2}$/.test(str)){
    const [y,m,d]=str.split('-').map(Number);
    return new Date(y,m-1,d);
  }
  const d=new Date(str);
  return isNaN(d)?null:d;
}

function mergeEvents(evList,calType,map){
  for(const ev of evList){
    if(!ev.start) continue;
    const s=parseDateTime(ev.start);
    const e=ev.end?parseDateTime(ev.end):null;
    if(!s) continue;
    let title=ev.title||'', type=calType;
    if(type==='personal') title='各種業務など';
    if(type==='closed')   title='休業日';
    const isAllDay=ev.allDay;
    const timeStr=isAllDay?'':`${fmtTime(s)}${e?'〜'+fmtTime(e):''}`;
    const sortN=isAllDay?-1:s.getHours()*60+s.getMinutes();
    const k=dateKey(s);
    if(!map[k]) map[k]=[];
    const dup=map[k].some(x=>x.title===title&&x.time===timeStr&&x.type===type);
    if(!dup) map[k].push({type,title,time:timeStr,allDay:isAllDay,sort:sortN,
      startMin:isAllDay?0:s.getHours()*60+s.getMinutes(),
      endMin:isAllDay?0:(e?e.getHours()*60+e.getMinutes():s.getHours()*60+s.getMinutes()+60)});
    // 終日複数日展開
    if(isAllDay&&e){
      const eAdj=new Date(e.getFullYear(),e.getMonth(),e.getDate()-1);
      if(eAdj>s){
        let d2=new Date(s.getFullYear(),s.getMonth(),s.getDate()+1);
        while(d2<=eAdj){
          const k2=dateKey(d2);
          if(!map[k2]) map[k2]=[];
          const dup2=map[k2].some(x=>x.title===title&&x.allDay&&x.type===type);
          if(!dup2) map[k2].push({type,title,time:'',allDay:true,sort:-1,startMin:0,endMin:0});
          d2.setDate(d2.getDate()+1);
        }
      }
    }
  }
}

function sortMap(map){ for(const k in map) map[k].sort((a,b)=>a.sort-b.sort); }

// ===== 3段階キャッシュ =====
async function loadData(force=false){
  const now=Date.now(), meta=getMeta();
  const today=new Date(), year=today.getFullYear(), month=today.getMonth()+1;
  const cached=loadCache();
  if(Object.keys(cached).length>0&&!force){ allEvents=cached; dataReady=true; }

  const isFirst=!meta.firstFetch, needWeek=!meta.weeklyFetch||(now-meta.weeklyFetch)>TTL_WEEK;
  const needDay=!meta.dailyFetch||(now-meta.dailyFetch)>TTL_DAY;

  if(isFirst||force){
    showBadge('初回データ取得中… 1/4');
    const map={}, fyY=month>=4?year:year-1;
    const blocks=[{y:fyY,m:4,n:3},{y:fyY,m:7,n:3},{y:fyY,m:10,n:3},{y:fyY+1,m:1,n:3}];
    for(let i=0;i<blocks.length;i++){
      showBadge(`初回データ取得中… ${i+1}/4`);
      try{
        const d=await fetchAll(blocks[i].y,blocks[i].m,blocks[i].n);
        Object.entries(d).forEach(([t,evs])=>mergeEvents(evs,t,map));
        sortMap(map); allEvents={...cached,...map}; saveCache(allEvents);
        dataReady=true; if(i===0) render();
      }catch(e){ console.warn('block fail',e); }
    }
    meta.firstFetch=now; meta.weeklyFetch=now; meta.dailyFetch=now; saveMeta(meta);
    hideBadge(); render();
  } else if(needWeek){
    if(dataReady) render();
    showBadge('週次更新中…');
    const map={...allEvents}, ws=addMonths(today,-1);
    try{
      const d=await fetchAll(ws.getFullYear(),ws.getMonth()+1,4);
      Object.entries(d).forEach(([t,evs])=>mergeEvents(evs,t,map));
      sortMap(map); allEvents=map; saveCache(allEvents);
    }catch(e){}
    meta.weeklyFetch=now; meta.dailyFetch=now; saveMeta(meta); hideBadge(); render();
  } else if(needDay){
    if(dataReady) render();
    showBadge('本日分更新中…');
    const map={...allEvents}, ds=addMonths(today,-1);
    try{
      const d=await fetchAll(ds.getFullYear(),ds.getMonth()+1,2);
      Object.entries(d).forEach(([t,evs])=>mergeEvents(evs,t,map));
      sortMap(map); allEvents=map; saveCache(allEvents);
    }catch(e){}
    meta.dailyFetch=now; saveMeta(meta); hideBadge(); render();
  } else {
    if(dataReady) render();
    setTimeout(async()=>{
      try{
        showBadge('最新確認中…');
        const map={...allEvents}, n2m=today.getDate()>10;
        const d=await fetchAll(year,month,n2m?2:1);
        Object.entries(d).forEach(([t,evs])=>mergeEvents(evs,t,map));
        sortMap(map); allEvents=map; saveCache(allEvents); hideBadge(); render();
      }catch(e){ hideBadge(); }
    },200);
  }
}

function showBadge(msg){
  let b=document.getElementById('sync-badge');
  if(!b){ b=document.createElement('div'); b.id='sync-badge';
    b.style.cssText='position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:rgba(61,43,26,.85);color:#fff;font-size:11px;font-weight:700;padding:7px 16px;border-radius:9999px;z-index:999;font-family:inherit;white-space:nowrap';
    document.body.appendChild(b); }
  b.textContent='🔄 '+msg; b.style.display='';
}
function hideBadge(){ const b=document.getElementById('sync-badge'); if(b)b.style.display='none'; }

// ===== ビュー切り替え =====
function setView(v){
  currentView=v;
  ['month','week','day'].forEach(x=>{
    document.getElementById(`view-${x}`).style.display=v===x?'':'none';
    document.getElementById(`vt-${x}`).classList.toggle('active',v===x);
  });
  offset=0; if(dataReady) render();
}
function render(){
  if(!dataReady) return;
  if(currentView==='month') renderMonth();
  else if(currentView==='week') renderWeek();
  else renderDay();
}

// ===== 月表示 =====
function renderMonth(){
  const now=new Date(), base=new Date(now.getFullYear(),now.getMonth()+offset,1);
  const dY=base.getFullYear(), dM=base.getMonth();
  document.getElementById('period-label').textContent=`${dY}年 ${dM+1}月`;
  const fd=new Date(dY,dM,1).getDay(), dim=new Date(dY,dM+1,0).getDate();
  const tKey=todayKey();
  if(!selectedDateKey) selectedDateKey=tKey;
  const WDS=['日','月','火','水','木','金','土'];
  let h=`<div id="view-month" style="padding:10px 10px 0">`;
  h+=`<div class="month-wds">${WDS.map((w,i)=>`<div class="mwd ${i===0?'s':i===6?'sa':''}">${w}</div>`).join('')}</div>`;
  h+=`<div class="month-grid">`;
  for(let i=0;i<fd;i++) h+=`<div class="mcell emp"></div>`;
  for(let d=1;d<=dim;d++){
    const dd=new Date(dY,dM,d), k=dateKey(dd), dow=dd.getDay();
    const evs=allEvents[k]||[];
    const hasCl=evs.some(e=>e.type==='closed');
    const isTd=k===tKey, isSel=k===selectedDateKey;
    const dc=dow===0?'sun-c':dow===6?'sat-c':'';
    // 月セル内のイベントをコンパクト表示（最大3件）
    const dispEvs=evs.slice(0,3);
    const evHtml=dispEvs.map(ev=>{
      const label=ev.type==='closed'?'休業':ev.type==='personal'?'業務':ev.title.replace(/（.+?）/g,'').slice(0,6);
      return `<div class="mcell-ev ${ev.type}">${label}</div>`;
    }).join('');
    h+=`<div class="mcell ${dc} ${isTd?'today-cell':''} ${isSel?'selected-cell':''}" onclick="selectMonthDay('${k}')">
      <div class="mcell-num">${d}</div>
      <div style="width:100%;padding:0 1px">${evHtml}</div>
    </div>`;
  }
  h+=`</div>${buildMonthDetail(selectedDateKey)}</div>`;
  document.getElementById('view-month').outerHTML=h;
  document.getElementById('view-month').style.display='';
}

function buildMonthDetail(k){
  if(!k) return '';
  const evs=allEvents[k]||[];
  const [y,m,d]=k.split('-').map(Number);
  const dow=new Date(y,m-1,d).getDay();
  const label=`${m}月${d}日（${'日月火水木金土'[dow]}）`;
  let body=evs.length===0?`<div class="md-empty">予定なし</div>`:evs.map(ev=>`
    <div class="md-ev">
      <div class="md-dot" style="background:var(--${ev.type})"></div>
      <div><div class="md-title" style="color:var(--${ev.type})">${ev.title}</div>
      ${ev.time?`<div class="md-time">${ev.time}</div>`:''}</div>
    </div>`).join('');
  return `<div class="month-detail"><div class="md-header">${label}</div><div class="md-body">${body}</div></div>`;
}

function selectMonthDay(k){
  selectedDateKey=k;
  const old=document.querySelector('.month-detail');
  if(old) old.outerHTML=buildMonthDetail(k);
  document.querySelectorAll('.mcell').forEach(c=>{
    c.classList.toggle('selected-cell',c.dataset&&c.dataset.key===k);
  });
  // onclick経由なのでdata属性なし→再描画
  renderMonth();
}

// ===== 週表示（Googleカレンダー風タイムライン） =====
function renderWeek(){
  const now=new Date(), mon=new Date(now);
  mon.setDate(now.getDate()-now.getDay()+1+offset*7);
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d);}
  const f=dates[0],l=dates[6];
  document.getElementById('period-label').textContent=`${f.getMonth()+1}/${f.getDate()}〜${l.getMonth()+1}/${l.getDate()}`;

  const START=7, END=22, PPM=2.8;
  const totalH=(END-START)*60*PPM;
  const DOW=['日','月','火','水','木','金','土'];
  const tKey=todayKey();
  const TW=40; // 時刻列幅px

  // ヘッダー（時刻列スペーサー付き）
  let hdrH=`<div class="week-header" style="display:flex;border-bottom:1px solid rgba(192,139,92,.15)">`;
  hdrH+=`<div style="width:${TW}px;flex-shrink:0"></div>`;
  dates.forEach(d=>{
    const k=dateKey(d),dow=d.getDay(),evs=allEvents[k]||[];
    const hasCl=evs.some(e=>e.type==='closed'), isTd=k===tKey;
    const dc=dow===0?'sun-col':dow===6?'sat-col':'';
    hdrH+=`<div class="wh-day ${dc} ${isTd?'today-col':''} ${hasCl?'closed-col':''}" style="flex:1;min-width:0">
      <div class="wh-dow">${DOW[dow]}</div>
      <div class="wh-num">${d.getDate()}</div>
    </div>`;
  });
  hdrH+=`</div>`;

  // 時刻列
  let timesH=`<div style="width:${TW}px;flex-shrink:0;height:${totalH}px;position:relative">`;
  for(let hr=START;hr<=END;hr++){
    const top=((hr-START)*60)*PPM;
    timesH+=`<div class="wt-label" style="top:${top}px">${hr}:00</div>`;
  }
  timesH+=`</div>`;

  // 横罫線
  let hlines='';
  for(let hr=START;hr<=END;hr++){
    const top=((hr-START)*60)*PPM;
    hlines+=`<div style="position:absolute;top:${top}px;left:0;right:0;border-top:1px solid rgba(192,139,92,.2);pointer-events:none;z-index:1"></div>`;
    if(hr<END){
      hlines+=`<div style="position:absolute;top:${top+30*PPM}px;left:0;right:0;border-top:1px dashed rgba(192,139,92,.08);pointer-events:none;z-index:1"></div>`;
    }
  }

  // 日列（flexで均等配置）
  let colsH=`<div style="flex:1;display:flex;position:relative;height:${totalH}px">`;
  colsH+=`<div style="position:absolute;inset:0;pointer-events:none">${hlines}</div>`;
  dates.forEach((d,di)=>{
    const k=dateKey(d), evs=allEvents[k]||[];
    const hasCl=evs.some(e=>e.type==='closed');
    let colH=`<div style="flex:1;min-width:0;position:relative;border-left:1px solid rgba(192,139,92,.1);height:${totalH}px">`;
    if(hasCl){
      colH+=`<div class="wday-closed"><span>休業日</span></div>`;
    } else {
      const timed=evs.filter(ev=>!ev.allDay&&ev.time&&ev.time.includes('〜')&&ev.startMin>=START*60&&ev.startMin<END*60);
      // 重複列分け
      const cols=[];
      timed.sort((a,b)=>a.startMin-b.startMin).forEach(ev=>{
        let placed=false;
        for(const col of cols){
          if(col[col.length-1].endMin<=ev.startMin){ col.push(ev); placed=true; break; }
        }
        if(!placed) cols.push([ev]);
      });
      const nCols=Math.max(cols.length,1);
      cols.forEach((col,ci)=>{
        col.forEach(ev=>{
          const top=(ev.startMin-START*60)*PPM;
          const ht=Math.max((ev.endMin-ev.startMin)*PPM,20);
          const w=`calc(${100/nCols}% - 2px)`;
          const left=`calc(${ci*100/nCols}% + 1px)`;
          const name=ev.type==='personal'?'業務':ev.title.replace(/（.+?）/g,'').slice(0,7);
          const grade=ev.title.match(/（(.+?)）/)?.[1]||'';
          const [ts]=ev.time.split('〜');
          colH+=`<div class="wev ${ev.type}" style="position:absolute;top:${top}px;height:${ht}px;left:${left};width:${w};z-index:2" title="${ev.title}（${ev.time}）">
            <span class="wev-time">${ts}</span>
            <span class="wev-name">${name}</span>
            ${grade&&ht>32?`<span style="font-size:7px;opacity:.6">（${grade}）</span>`:''}
          </div>`;
        });
      });
    }
    colH+=`</div>`;
    colsH+=colH;
  });
  colsH+=`</div>`;

  const h=`<div id="view-week" style="padding:0;overflow:hidden">
    ${hdrH}
    <div class="week-body" style="display:flex;overflow-y:auto;max-height:calc(100vh - 180px)">
      ${timesH}${colsH}
    </div>
  </div>`;
  document.getElementById('view-week').outerHTML=h;
  document.getElementById('view-week').style.display='';

  // 現在時刻付近にスクロール
  setTimeout(()=>{
    const wb=document.querySelector('.week-body');
    if(wb){ const n=new Date(); wb.scrollTop=Math.max(0,((n.getHours()-START)*60+n.getMinutes())*PPM-80); }
  },50);
}

// ===== 日表示 =====
function renderDay(){
  const now=new Date(), mon=new Date(now);
  mon.setDate(now.getDate()-now.getDay()+1+offset*7);
  const dates=[];
  for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);dates.push(d);}
  const f=dates[0],l=dates[6];
  document.getElementById('period-label').textContent=`${f.getMonth()+1}/${f.getDate()}〜${l.getMonth()+1}/${l.getDate()}`;
  const tKey=todayKey();
  if(!selectedDateKey||!dates.find(d=>dateKey(d)===selectedDateKey)){
    selectedDateKey=dates.find(d=>dateKey(d)===tKey)?tKey:dateKey(dates[0]);
  }
  const DS=['日','月','火','水','木','金','土'];

  // タブ
  let tabsH=`<div class="day-tabs">`;
  dates.forEach(d=>{
    const k=dateKey(d),dow=d.getDay(),evs=allEvents[k]||[];
    const hasCl=evs.some(e=>e.type==='closed');
    const isTd=k===tKey,isSel=k===selectedDateKey;
    const dc=dow===0?'sun':dow===6?'sat':'';
    const dot=hasCl&&!isSel?'<div class="cdot"></div>':'';
    tabsH+=`<button class="dtab ${dc} ${isSel?'active':''} ${isTd?'today-dt':''} ${hasCl?'closed-dt':''}" onclick="selectDay('${k}')">
      <span class="dt-dow">${DS[dow]}</span><span class="dt-num">${d.getDate()}</span>${dot}
    </button>`;
  });
  tabsH+=`</div>`;

  const evs=allEvents[selectedDateKey]||[];
  const [sy,sm,sdd]=selectedDateKey.split('-').map(Number);
  const sdow=new Date(sy,sm-1,sdd).getDay();
  const hasCl=evs.some(e=>e.type==='closed');
  let statusH=hasCl
    ?`<div class="day-status closed"><div class="ds-dot"></div>休業日</div>`
    :`<div class="day-status open"><div class="ds-dot"></div>${sm}月${sdd}日（${'日月火水木金土'[sdow]}）</div>`;

  // タイムライン（7〜22時、実際の開始時刻でグループ化）
  const DAY_START=7*60, DAY_END=22*60;

  // 時刻ごとにグループ化（実際の開始時刻）
  const timeMap={};
  const allDayEvs=[];
  evs.forEach(ev=>{
    if(ev.allDay){ allDayEvs.push(ev); return; }
    if(!ev.time||!ev.time.includes('〜')) return;
    const sm2=ev.startMin;
    if(sm2<DAY_START||sm2>=DAY_END) return;
    const key=`${pad(Math.floor(sm2/60))}:${pad(sm2%60)}`;
    if(!timeMap[key]) timeMap[key]=[];
    timeMap[key].push(ev);
  });

  // 全タイムキーをソート
  const allKeys=Object.keys(timeMap).sort();

  let tlH=`<div class="day-timeline">`;

  // 終日イベント
  allDayEvs.forEach(ev=>{
    tlH+=`<div class="day-time-row hour-row">
      <div class="dtr-label">終日</div>
      <div class="dtr-cards">
        <div class="dcard ${ev.type}" style="width:100%">
          <div class="dcard-initial">${ev.type==='closed'?'🔴 休業日':ev.title}</div>
        </div>
      </div>
    </div>`;
  });

  // 7〜22時を1時間刻みで、予定がある時刻はその位置に挿入
  let processedKeys=new Set();
  for(let hr=DAY_START;hr<DAY_END;hr+=60){
    const hrKey=`${pad(Math.floor(hr/60))}:00`;
    // この時間帯（hr〜hr+60）にある予定キーを全部収集
    const keysInHour=allKeys.filter(k=>{
      const m=toM(k);
      return m>=hr && m<hr+60 && !processedKeys.has(k);
    });

    if(keysInHour.length===0){
      // 空き時間
      tlH+=`<div class="day-time-row hour-row">
        <div class="dtr-label dim">${hrKey}</div>
        <div class="dtr-cards"></div>
      </div>`;
    } else {
      // 最初の予定キーで時間ラベルを表示
      let firstInHour=true;
      keysInHour.forEach(key=>{
        processedKeys.add(key);
        const slotEvs=timeMap[key];
        const isFirst=firstInHour&&key===hrKey||firstInHour;
        firstInHour=false;
        let cards='';
        slotEvs.forEach(ev=>{
          if(ev.type==='lesson'){
            const match=ev.title.match(/^(.+?)（(.+?)）/);
            const initial=match?match[1]:ev.title;
            const grade=match?match[2]:'';
            cards+=`<div class="dcard lesson">
              <span class="dcard-time">${ev.time}</span>
              <div class="dcard-initial">${initial}</div>
              ${grade?`<div class="dcard-grade">（${grade}）</div>`:''}
            </div>`;
          } else {
            cards+=`<div class="dcard ${ev.type}" style="width:100%">
              <span class="dcard-time">${ev.time}</span>
              <div class="dcard-initial">${ev.title}</div>
            </div>`;
          }
        });
        const dispLabel=isFirst?hrKey:key;
        tlH+=`<div class="day-time-row ${key===hrKey?'hour-row':''}">
          <div class="dtr-label">${dispLabel}</div>
          <div class="dtr-cards">${cards}</div>
        </div>`;
      });
    }
  }
  tlH+=`</div>`;

  const container=document.getElementById('view-day');
  container.innerHTML=tabsH+statusH+tlH;
  container.style.display='';
}

function selectDay(k){ selectedDateKey=k; renderDay(); }

// ===== ナビ =====
document.getElementById('btn-prev').addEventListener('click',()=>{ offset--; render(); });
document.getElementById('btn-next').addEventListener('click',()=>{ offset++; render(); });

function forceRefresh(){
  dataReady=false; allEvents={};
  localStorage.removeItem(CACHE_KEY); localStorage.removeItem(CACHE_META);
  loadData(true).then(()=>setView(currentView));
}

// ===== 起動 =====
setView('day');
loadData();
</script>
