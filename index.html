<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>アトリエやまと｜スケジュール</title>
<link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;500;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<style>
/* ===== ベース ===== */
:root{
  --bg:#F7F2EA;
  --sd:rgba(180,148,110,.35);
  --sl:rgba(255,255,255,.9);
  --tan:#C08B5C;
  --brown:#3D2B1A;
  --mu:#9C7E5F;
  --lesson:#2E7D52;
  --lesson-bg:rgba(46,125,82,.15);
  --personal:#7B5EA7;
  --personal-bg:rgba(123,94,167,.12);
  --closed:#B03A2E;
  --closed-bg:rgba(176,58,46,.1);
  --radius:18px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  background:var(--bg);
  font-family:'M PLUS Rounded 1c',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
  color:var(--brown);
  min-height:100vh;
}

/* ===== ヘッダー ===== */
.app-header{
  background:var(--bg);
  padding:14px 16px 10px;
  box-shadow:0 4px 20px rgba(180,148,110,.15);
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:200;
}
.app-title{
  font-size:13px;font-weight:800;color:var(--tan);letter-spacing:.04em;
}
.sync-btn{
  background:none;border:none;cursor:pointer;
  font-size:10px;font-weight:700;color:var(--mu);
  font-family:inherit;text-decoration:underline;padding:4px;
}

/* ===== カレンダーラッパー ===== */
#cal-wrap{
  padding:12px;
  max-width:900px;
  margin:0 auto;
}

/* ===== FullCalendar オーバーライド ===== */
.fc{
  font-family:'M PLUS Rounded 1c',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif !important;
}

/* ツールバー */
.fc .fc-toolbar{
  margin-bottom:12px !important;
  flex-wrap:wrap;
  gap:8px;
}
.fc .fc-toolbar-title{
  font-size:1.1rem !important;
  font-weight:800 !important;
  color:var(--brown) !important;
}

/* ツールバーボタン */
.fc .fc-button{
  background:var(--bg) !important;
  border:none !important;
  color:var(--brown) !important;
  font-family:'M PLUS Rounded 1c',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif !important;
  font-weight:700 !important;
  font-size:11px !important;
  border-radius:9999px !important;
  padding:6px 14px !important;
  box-shadow:4px 4px 10px var(--sd),-3px -3px 8px var(--sl) !important;
  transition:all .18s !important;
}
.fc .fc-button:hover{
  background:var(--bg) !important;
  box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl) !important;
}
.fc .fc-button-active,.fc .fc-button:not(:disabled):active{
  background:var(--tan) !important;
  color:#fff !important;
  box-shadow:inset 3px 3px 8px rgba(140,80,20,.3),inset -2px -2px 6px rgba(255,200,140,.3) !important;
}
.fc .fc-button-primary:not(:disabled).fc-button-active{
  background:var(--tan) !important;
  color:#fff !important;
}

/* 今日ボタン */
.fc .fc-today-button{
  background:var(--tan) !important;
  color:#fff !important;
}
/* 今日ボタン：無効状態（すでに今日を表示中）*/
.fc .fc-today-button:disabled{
  background:var(--bg) !important;
  color:var(--mu) !important;
  opacity:0.6 !important;
  box-shadow:inset 2px 2px 6px var(--sd),inset -2px -2px 5px var(--sl) !important;
}

/* 曜日ヘッダー */
.fc .fc-col-header-cell{
  background:var(--bg) !important;
  padding:6px 0 !important;
}
.fc .fc-col-header-cell-cushion{
  font-size:11px !important;
  font-weight:700 !important;
  color:var(--mu) !important;
  text-decoration:none !important;
}
.fc .fc-col-header-cell.fc-day-sun .fc-col-header-cell-cushion{color:#c0392b !important}
.fc .fc-col-header-cell.fc-day-sat .fc-col-header-cell-cushion{color:#2E7A94 !important}

/* 月表示のセル */
.fc .fc-daygrid-day{
  background:var(--bg) !important;
}
.fc .fc-daygrid-day:hover{
  background:rgba(192,139,92,.06) !important;
}
.fc .fc-daygrid-day-number{
  font-size:12px !important;
  font-weight:700 !important;
  color:var(--brown) !important;
  text-decoration:none !important;
  padding:4px 6px !important;
}
.fc .fc-day-today{
  background:rgba(192,139,92,.08) !important;
}
.fc .fc-day-today .fc-daygrid-day-number{
  background:var(--tan) !important;
  color:#fff !important;
  border-radius:50% !important;
  width:26px !important;
  height:26px !important;
  min-width:26px !important;
  display:flex !important;
  align-items:center !important;
  justify-content:center !important;
  font-size:11px !important;
  padding:0 !important;
  line-height:1 !important;
}
.fc .fc-day-sun .fc-daygrid-day-number{color:#c0392b !important}
.fc .fc-day-sat .fc-daygrid-day-number{color:#2E7A94 !important}

/* 週・日表示の時間軸 */
.fc .fc-timegrid-slot{
  height:34px !important;
}
.fc .fc-timegrid-slot-label{
  font-size:9px !important;
  font-weight:700 !important;
  color:var(--mu) !important;
}
.fc .fc-timegrid-now-indicator-line{
  border-color:var(--tan) !important;
  border-width:2px !important;
}
.fc .fc-timegrid-now-indicator-arrow{
  border-top-color:var(--tan) !important;
  border-bottom-color:var(--tan) !important;
}
/* 週表示：同時間帯の予定を細くして文字が重ならないように */
.fc-timegrid-event{
  min-width:0 !important;
}
.fc-timegrid-col-events{
  margin:0 1px !important;
}

/* 予定イベント共通 */
.fc .fc-event{
  border:none !important;
  border-radius:7px !important;
  font-family:'M PLUS Rounded 1c',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif !important;
  font-size:9.5px !important;
  font-weight:700 !important;
  cursor:default !important;
  box-shadow:1px 2px 5px rgba(0,0,0,.12) !important;
  overflow:hidden !important;
  transition:z-index 0s, transform .1s !important;
}
/* ホバー時に前面に出す */
.fc-timegrid-event:hover{
  z-index:999 !important;
  transform:scale(1.02) !important;
  box-shadow:2px 4px 12px rgba(0,0,0,.25) !important;
  overflow:visible !important;
}
.fc .fc-event-title{
  font-weight:800 !important;
  white-space:normal !important;
  word-break:break-all !important;
  overflow:hidden !important;
  display:block !important;
  line-height:1.25 !important;
}
.fc .fc-event-time{
  font-size:8px !important;
  opacity:.85 !important;
  white-space:nowrap !important;
  overflow:hidden !important;
}
/* 週表示で重なり防止：予定を小さめに */
.fc-timegrid-event .fc-event-main{
  padding:1px 3px !important;
}
.fc-timegrid-event-harness{
  margin-right:1px !important;
}

/* イベントカラー */
.fc-event-lesson{
  background:#4a9e6e !important;
  color:#fff !important;
  border-left:3px solid var(--lesson) !important;
}
.fc-event-personal{
  background:#8b72b8 !important;
  color:#fff !important;
  border-left:3px solid var(--personal) !important;
}
.fc-event-closed{
  background:#c0614e !important;
  color:#fff !important;
  border-left:3px solid var(--closed) !important;
}

/* グリッド線 */
.fc .fc-scrollgrid{
  border-color:rgba(192,139,92,.15) !important;
  border-radius:14px !important;
  overflow:hidden !important;
  box-shadow:6px 6px 18px var(--sd),-4px -4px 12px var(--sl) !important;
}
.fc td,.fc th{
  border-color:rgba(192,139,92,.12) !important;
}
.fc .fc-timegrid-slot-minor{
  border-top-style:dashed !important;
  border-color:rgba(192,139,92,.06) !important;
}

/* ローディング */
#loading-wrap{
  text-align:center;padding:60px 20px;
}
.spin{
  width:32px;height:32px;
  border:3px solid rgba(192,139,92,.2);
  border-top-color:var(--tan);
  border-radius:50%;
  animation:sp .75s linear infinite;
  margin:0 auto 14px;
}
@keyframes sp{to{transform:rotate(360deg)}}
#loading-wrap p{font-size:13px;color:var(--mu);margin-top:8px}
#loading-progress{font-size:12px;color:var(--tan);font-weight:700;margin-top:4px}

/* 凡例 */
.legend{
  display:flex;gap:12px;flex-wrap:wrap;justify-content:center;
  padding:12px 16px;margin:10px 12px 0;
  background:var(--bg);
  box-shadow:inset 3px 3px 8px var(--sd),inset -2px -2px 6px var(--sl);
  border-radius:14px;
}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;font-weight:600;color:var(--mu)}
.legend-dot{width:9px;height:9px;border-radius:50%}

/* ツールチップアニメ */
@keyframes tipIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}

/* スマホ用ボトムパネル */
#ev-panel{
  position:fixed;bottom:0;left:0;right:0;z-index:99999;
  background:#3D2B1A;color:#fff;
  padding:20px 20px 32px;
  border-radius:20px 20px 0 0;
  box-shadow:0 -4px 30px rgba(0,0,0,.4);
  font-family:inherit;
  animation:slideUp .25s ease;
  display:none;
}
#ev-panel .ep-title{font-size:16px;font-weight:800;line-height:1.3;margin-bottom:8px}
#ev-panel .ep-time{font-size:14px;font-weight:600;opacity:.85;margin-bottom:16px}
#ev-panel .ep-close{
  display:block;width:100%;
  background:rgba(255,255,255,.15);border:none;color:#fff;
  font-size:13px;font-weight:700;padding:10px;border-radius:10px;
  cursor:pointer;font-family:inherit;
}
#ev-panel-bg{
  position:fixed;inset:0;z-index:99998;
  background:rgba(0,0,0,.3);display:none;
}

/* 同期バッジ */
#sync-badge{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  background:rgba(61,43,26,.85);color:#fff;
  font-size:11px;font-weight:700;
  padding:8px 18px;border-radius:9999px;
  z-index:999;white-space:nowrap;display:none;
  font-family:'M PLUS Rounded 1c',-apple-system,BlinkMacSystemFont,'Helvetica Neue',sans-serif;
}

/* レスポンシブ */
@media(max-width:600px){
  .fc .fc-toolbar{gap:6px}
  .fc .fc-button{font-size:10px !important;padding:5px 10px !important}
  .fc .fc-toolbar-title{font-size:.95rem !important}
  .fc .fc-timegrid-slot{height:24px !important}
}

/* 折り返し強制 */
.fc-timegrid-event .fc-event-title{
  white-space:normal !important;
  word-break:break-all !important;
  overflow:hidden !important;
  line-height:1.25 !important;
}
.fc-daygrid-event .fc-event-title{
  white-space:nowrap !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
}

/* 週・日表示の予定タイトル折り返し */
.fc-timegrid-event .fc-event-title,
.fc-timegrid-event .fc-event-title-container,
.fc-timegrid-event .fc-event-main,
.fc-timegrid-event .fc-event-main-frame{
  white-space:normal !important;
  word-break:break-all !important;
  overflow-wrap:anywhere !important;
  overflow:hidden !important;
  line-height:1.25 !important;
  min-width:0 !important;
}
.fc-timegrid-event .fc-event-main-frame{
  flex-direction:column !important;
}
.fc-timegrid-event .fc-event-time{
  flex-shrink:0 !important;
  font-size:8px !important;
  white-space:nowrap !important;
  overflow:hidden !important;
  text-overflow:ellipsis !important;
}

/* ボタングループ */
.fc .fc-button-group{
  display:flex !important;
  gap:2px !important;
}
.fc .fc-toolbar-chunk{
  display:flex !important;
  align-items:center !important;
  gap:4px !important;
}
</style>
</head>
<body>

<div class="app-header" id="app-header" style="display:none">
  <div class="app-title">アトリエやまと スケジュール</div>
  <button class="sync-btn" onclick="forceRefresh()">更新</button>
</div>

<div id="loading-wrap">
  <div class="spin"></div>
  <p id="loading-main">読み込み中</p>
  <p id="loading-progress"></p>
</div>

<div id="cal-wrap" style="display:none;visibility:hidden">
  <div id="calendar"></div>
</div>

<div class="legend" id="legend-area" style="display:none">
  <div class="legend-item"><div class="legend-dot" style="background:var(--lesson)"></div>授業・教室</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--personal)"></div>各種業務など</div>
  <div class="legend-item"><div class="legend-dot" style="background:var(--closed)"></div>休業日</div>
</div>

<div id="sync-badge"></div>
<div id="ev-panel-bg" onclick="closePanel()"></div>
<div id="ev-panel">
  <div class="ep-title" id="ep-title"></div>
  <div class="ep-time" id="ep-time"></div>
  <button class="ep-close" onclick="closePanel()">閉じる</button>
</div>

<script>
// =============================================
// 設定
// =============================================
const GAS = 'https://script.google.com/macros/s/AKfycbyCyQRvex2hkr899np_SryVq7GhEFlqFiHNebdnleh0znn6FLfMk7TPLaFC3rFPmcnvqQ/exec';
const CACHE_KEY      = 'atelier_fc_v1';
const CACHE_META     = 'atelier_fc_meta_v1';
const CACHE_FETCHED  = 'atelier_fc_fetched_v1'; // 取得済み月の記録
const TTL_DAY    = 24*60*60*1000;
const TTL_WEEK   = 7*24*60*60*1000;

let calendar = null;
let allFcEvents = [];

// =============================================
// キャッシュ
// =============================================
function saveCache(evs){ try{ localStorage.setItem(CACHE_KEY, JSON.stringify(evs)); }catch(e){} }
function loadCache(){ try{ const s=localStorage.getItem(CACHE_KEY); return s?JSON.parse(s):[]; }catch(e){ return []; } }
function getMeta(){ try{ const s=localStorage.getItem(CACHE_META); return s?JSON.parse(s):{}; }catch(e){ return {}; } }
function saveMeta(m){ try{ localStorage.setItem(CACHE_META, JSON.stringify(m)); }catch(e){} }

// =============================================
// GAS取得
// =============================================
async function fetchAll(year, month, months=1){
  const url = `${GAS}?type=all&year=${year}&month=${month}&months=${months}`;
  // AbortSignal.timeoutが使えない古いブラウザ対応
  let signal;
  try{
    const ac = new AbortController();
    setTimeout(()=>ac.abort(), 20000);
    signal = ac.signal;
  }catch(e){ signal = undefined; }
  const r = await fetch(url, signal ? {signal} : {});
  if(!r.ok) throw new Error('fetch error');
  const d = await r.json();
  if(typeof d !== 'object' || Array.isArray(d)) throw new Error('invalid');
  return d;
}

// =============================================
// データ変換（GAS → FullCalendarイベント）
// =============================================
function convertToFcEvents(data){
  const events = [];
  const seen = new Set();

  Object.entries(data).forEach(([calType, evList])=>{
    for(const ev of evList){
      if(!ev.start) continue;

      let title = ev.title || '';
      let className = 'fc-event-lesson';

      if(calType === 'personal'){
        title = '各種業務など';
        className = 'fc-event-personal';
      } else if(calType === 'closed'){
        title = '休業日';
        className = 'fc-event-closed';
      }

      // 重複除去
      const key = `${calType}|${title}|${ev.start}|${ev.end}`;
      if(seen.has(key)) continue;
      seen.add(key);

      if(ev.allDay && calType === 'closed'){
        // 休業日：背景色＋ラベルを1回ずつだけ追加
        events.push({
          display: 'background',
          backgroundColor: 'rgba(176,58,46,.15)',
          start: ev.start,
          end:   ev.end,
          allDay: true,
          classNames: ['fc-event-closed'],
        });
        events.push({
          title: '休業日',
          start: ev.start,
          end:   ev.end,
          allDay: true,
          classNames: ['fc-event-closed'],
          display: 'block',
        });
        continue;
      }

      const fcEv = {
        title,
        classNames: [className],
        start: ev.start,
        end:   ev.end,
        allDay: ev.allDay || false,
        display: 'block',
      };
      events.push(fcEv);
    }
  });

  return events;
}

// =============================================
// マージ（既存イベントに新しいデータを統合）
// =============================================
function mergeToFcEvents(newData, existing){
  const newEvs = convertToFcEvents(newData);
  const seen = new Set(existing.map(e=>`${e.title}|${e.start}|${e.end||''}`));
  const merged = [...existing];
  newEvs.forEach(ev=>{
    const key = `${ev.title}|${ev.start}|${ev.end||''}`;
    if(!seen.has(key)){ seen.add(key); merged.push(ev); }
  });
  return merged;
}

// =============================================
// 取得済み月の管理
// =============================================
function getFetchedMonths(){
  try{ const s=localStorage.getItem(CACHE_FETCHED); return s?JSON.parse(s):{}; }catch(e){ return {}; }
}
function markFetched(year, month){
  const m=getFetchedMonths();
  m[year+'-'+String(month).padStart(2,'0')]=true;
  try{ localStorage.setItem(CACHE_FETCHED, JSON.stringify(m)); }catch(e){}
}
function isFetched(year, month){
  return !!getFetchedMonths()[year+'-'+String(month).padStart(2,'0')];
}

// =============================================
// ツールチップ
// =============================================
function hideTip(){
  const t = document.getElementById('fc-tip');
  if(t) t.remove();
  if(window._tipTimer){ clearTimeout(window._tipTimer); window._tipTimer=null; }
}

function showTip(ev, el){
  hideTip();

  const title = ev.title;
  const start = ev.start, end = ev.end;
  const fmt = d => d ? String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0') : '';
  const timeStr = (start && !ev.allDay) ? fmt(start)+(end?' 〜 '+fmt(end):'') : '';

  const tip = document.createElement('div');
  tip.id = 'fc-tip';
  tip.innerHTML =
    '<div style="font-size:15px;font-weight:800;line-height:1.3;margin-bottom:'+(timeStr?'8':'4')+'px">'+title+'</div>'+
    (timeStr?'<div style="font-size:13px;opacity:.85;margin-bottom:12px">'+timeStr+'</div>':'')+
    '<button id="fc-tip-btn" style="display:block;width:100%;background:rgba(255,255,255,.2);border:none;color:#fff;font-size:12px;font-weight:700;padding:8px;border-radius:8px;cursor:pointer;font-family:inherit;letter-spacing:.05em">閉じる</button>';

  const rect = el.getBoundingClientRect();
  const W=220, H=120;
  let left = rect.left;
  let top  = rect.bottom + 8;
  if(left+W > window.innerWidth-8)  left = window.innerWidth-W-8;
  if(top+H  > window.innerHeight-8) top  = Math.max(8, rect.top-H-8);
  if(left < 8) left = 8;

  tip.style.cssText =
    'position:fixed;z-index:99999;background:#3D2B1A;color:#fff;'+
    'padding:14px 16px;border-radius:14px;'+
    'box-shadow:0 8px 28px rgba(0,0,0,.55);'+
    'font-family:inherit;width:'+W+'px;'+
    'left:'+left+'px;top:'+top+'px;'+
    'animation:tipIn .15s ease;';

  document.body.appendChild(tip);

  document.getElementById('fc-tip-btn').onclick = function(){ hideTip(); };

  // 6秒後に自動消去
  window._tipTimer = setTimeout(hideTip, 6000);
}

// =============================================
// バッジ
// =============================================
function showBadge(msg){
  const b = document.getElementById('sync-badge');
  b.textContent = msg;
  b.style.display = 'block';
}
function hideBadge(){
  document.getElementById('sync-badge').style.display = 'none';
}

// =============================================
// カレンダー初期化
// =============================================
function initCalendar(events){
  const el = document.getElementById('calendar');

  calendar = new FullCalendar.Calendar(el, {
    locale: 'ja',
    allDayText: '終日',
    initialView: window.innerWidth < 600 ? 'timeGridDay' : 'dayGridMonth',
    headerToolbar:{
      left:  'prev,next today',
      center: 'title',
      right:  'dayGridMonth,timeGridWeek,timeGrid3Day,timeGridDay'
    },
    views:{
      timeGrid3Day:{
        type: 'timeGrid',
        duration: { days: 3 },
        buttonText: '3日',
      }
    },
    buttonText:{
      today: '今日',
      month: '月',
      week:  '週',
      day:   '日',
    },
    slotMinTime: '09:00:00',
    slotMaxTime: '22:00:00',
    slotDuration: '00:30:00',
    slotEventOverlap: false,
    slotHeight: 32,
    slotLabelInterval: '01:00',
    scrollTime: '13:00:00',
    nowIndicator: true,
    dayMaxEvents: 4,
    height: 'auto',
    expandRows: true,
    events: events,
    eventTimeFormat:{
      hour:   '2-digit',
      minute: '2-digit',
      hour12: false,
    },
    eventClick: function(info){
      info.jsEvent.preventDefault();
      info.jsEvent.stopPropagation();
      showTip(info.event, info.el);
    },
    eventContent: function(arg){
      const view = arg.view.type;
      const ev = arg.event;
      const title = ev.title;
      const timeText = arg.timeText;

      // 月表示はデフォルト
      if(view === 'dayGridMonth') return true;

      const el = document.createElement('div');
      el.style.cssText = 'padding:2px 3px;height:100%;display:flex;flex-direction:column;justify-content:flex-start;overflow:hidden;';

      if(timeText && view === 'timeGridDay'){
        const tEl = document.createElement('div');
        tEl.style.cssText = 'font-size:8px;opacity:.85;white-space:nowrap;line-height:1.3;overflow:hidden;text-overflow:ellipsis;';
        tEl.textContent = timeText;
        el.appendChild(tEl);
      }

      // 名前を縦折り返しで表示（Googleカレンダー風）
      const nEl = document.createElement('div');
      nEl.style.cssText = 'font-size:10px;font-weight:800;line-height:1.25;overflow:hidden;word-break:break-all;white-space:normal;';
      nEl.textContent = title;
      el.appendChild(nEl);

      return { domNodes: [el] };
    },
    datesSet: function(info){
      hideTip();
      // 表示範囲に未取得の月があれば自動フェッチ
      if(window._navFetchTimer) clearTimeout(window._navFetchTimer);
      window._navFetchTimer = setTimeout(()=>{
        fetchIfNeeded(info.start, info.end);
      }, 300);
    },
    dayCellDidMount(info){
      if(info.date.getDay()===0) info.el.style.color='#c0392b';
      if(info.date.getDay()===6) info.el.style.color='#2E7A94';
    },
  });

  // カレンダーを非表示のままrender（データが来てから表示する）
  document.getElementById('cal-wrap').style.display = '';
  calendar.render();
  // ※ ローディング画面はshowCalendar()が呼ばれるまで維持
}

function showCalendar(){
  if(window._calShown) return;
  window._calShown = true;
  // ローディングを消してカレンダーを表示
  document.getElementById('loading-wrap').style.display = 'none';
  var c=document.getElementById('cal-wrap'); if(c){ c.style.visibility='visible'; }
  var h=document.getElementById('app-header'); if(h) h.style.display='flex';
  var l=document.getElementById('legend-area'); if(l) l.style.display='';
  // カレンダーサイズを再計算
  if(calendar) calendar.updateSize();
}

// =============================================
// データロード（即表示→バックグラウンド取得）
// =============================================
async function loadData(force=false){
  const now   = Date.now();
  const meta  = getMeta();
  const today = new Date();
  const year  = today.getFullYear();
  const month = today.getMonth() + 1;
  const cached = loadCache();

  // ===== Step1: データ取得してからカレンダー表示 =====
  const isFirst  = force || !meta.firstFetch;
  const needWeek = !meta.weeklyFetch || (now - meta.weeklyFetch) > TTL_WEEK;
  const needDay  = !meta.dailyFetch  || (now - meta.dailyFetch)  > TTL_DAY;

  if(isFirst){
    // 初回：当月2ヶ月を取得してからカレンダーを初期化
    document.getElementById('loading-progress').textContent = '取得中…';
    let evs = cached;
    try{
      const d = await fetchAll(year, month, 2);
      evs = mergeToFcEvents(d, cached);
      saveCache(evs);
      meta.firstFetch = now; meta.weeklyFetch = now; meta.dailyFetch = now;
      saveMeta(meta);
      // 取得済み月を記録
      for(let i=0;i<2;i++){
        const dt=new Date(year, month-1+i, 1);
        markFetched(dt.getFullYear(), dt.getMonth()+1);
      }
    }catch(e){
      console.warn('fetch fail', e);
      // 失敗してもキャッシュかemptyで表示
    }
    allFcEvents = evs;
    document.getElementById('loading-progress').textContent = '';
    if(!calendar) initCalendar(evs);
    else refreshCalendarSource(evs);
    showCalendar(); // データ取得後に表示

    // 年間データをさらにバックグラウンドで
    bgFetchYear(year, month);

  } else if(needWeek){
    showBadge('更新中…');
    try{
      const ws = new Date(today); ws.setMonth(ws.getMonth()-1);
      const d = await fetchAll(ws.getFullYear(), ws.getMonth()+1, 4);
      allFcEvents = mergeToFcEvents(d, cached);
      saveCache(allFcEvents);
      refreshCalendarSource(allFcEvents);
      meta.weeklyFetch = now; meta.dailyFetch = now;
      saveMeta(meta);
    }catch(e){}
    hideBadge();
    showCalendar();

  } else if(needDay){
    showBadge('更新中…');
    try{
      const ds = new Date(today); ds.setMonth(ds.getMonth()-1);
      const d = await fetchAll(ds.getFullYear(), ds.getMonth()+1, 2);
      allFcEvents = mergeToFcEvents(d, cached);
      saveCache(allFcEvents);
      refreshCalendarSource(allFcEvents);
      meta.dailyFetch = now;
      saveMeta(meta);
    }catch(e){}
    hideBadge();
    showCalendar();

  } else {
    // キャッシュで即表示
    allFcEvents = cached;
    if(!calendar) initCalendar(cached);
    showCalendar(); // キャッシュで即表示
    // バックグラウンドで当月確認
    setTimeout(async()=>{
      try{
        const d = await fetchAll(year, month, today.getDate()>10?2:1);
        allFcEvents = mergeToFcEvents(d, allFcEvents.length?allFcEvents:cached);
        saveCache(allFcEvents);
        refreshCalendarSource(allFcEvents);
      }catch(e){}
    }, 500);
  }
}

async function bgFetchYear(year, month){
  const fyY = month >= 4 ? year : year - 1;
  const blocks = [
    {y:fyY,m:4,n:3},{y:fyY,m:7,n:3},
    {y:fyY,m:10,n:3},{y:fyY+1,m:1,n:3}
  ];
  let evs = [...allFcEvents];
  for(let i=0;i<blocks.length;i++){
    try{
      showBadge('年間データ '+(i+1)+'/4');
      const d = await fetchAll(blocks[i].y,blocks[i].m,blocks[i].n);
      evs = mergeToFcEvents(d, evs);
      saveCache(evs);
      refreshCalendarSource(evs);
      allFcEvents = evs;
      // 取得済みとして記録
      for(let mo=0;mo<blocks[i].n;mo++){
        const dt=new Date(blocks[i].y, blocks[i].m-1+mo, 1);
        markFetched(dt.getFullYear(), dt.getMonth()+1);
      }
    }catch(e){}
  }
  hideBadge();
}

// ナビゲーション時に未取得の月を自動フェッチ
let _navFetchTimer = null;
async function fetchIfNeeded(startDate, endDate){
  // 表示範囲の月リストを作成
  const months = [];
  const d = new Date(startDate.getFullYear(), startDate.getMonth(), 1);
  while(d <= endDate){
    months.push({y: d.getFullYear(), m: d.getMonth()+1});
    d.setMonth(d.getMonth()+1);
  }
  // 未取得の月を探す
  const missing = months.filter(({y,m}) => !isFetched(y,m));
  if(missing.length === 0) return;

  // まとめて1リクエストで取得（最初の月から最後の月まで）
  const first = missing[0];
  const last  = missing[missing.length-1];
  const totalMonths = (last.y - first.y)*12 + (last.m - first.m) + 1;

  showBadge('読み込み中…');
  try{
    const d = await fetchAll(first.y, first.m, totalMonths);
    allFcEvents = mergeToFcEvents(d, allFcEvents);
    saveCache(allFcEvents);
    refreshCalendarSource(allFcEvents);
    // 取得済みとして記録
    missing.forEach(({y,m}) => markFetched(y,m));
  }catch(e){ console.warn('fetchIfNeeded fail',e); }
  hideBadge();
}


function refreshCalendarSource(events){
  if(!calendar) return;
  calendar.getEventSources().forEach(s => s.remove());
  calendar.addEventSource(events);
}

function closePanel(){
  document.getElementById("ev-panel").style.display="none";
  document.getElementById("ev-panel-bg").style.display="none";
}

function forceRefresh(){
  localStorage.removeItem(CACHE_KEY);
  localStorage.removeItem(CACHE_META);
  localStorage.removeItem(CACHE_FETCHED);
  window._calShown = false;
  allFcEvents = [];
  loadData(true);
}

// =============================================
// スワイプで前後に移動
// =============================================
(function(){
  let startX = 0, startY = 0, startTime = 0;
  const el = document.getElementById('cal-wrap');

  document.addEventListener('touchstart', e=>{
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    startTime = Date.now();
  }, {passive:true});

  document.addEventListener('touchend', e=>{
    if(!calendar) return;
    const dx = e.changedTouches[0].clientX - startX;
    const dy = e.changedTouches[0].clientY - startY;
    const dt = Date.now() - startTime;
    // 横スワイプ判定：横移動>60px、縦移動<横の半分、時間<400ms
    if(Math.abs(dx) > 60 && Math.abs(dy) < Math.abs(dx) * 0.6 && dt < 400){
      if(dx < 0) calendar.next();   // 左スワイプ→次へ
      else        calendar.prev();  // 右スワイプ→前へ
    }
  }, {passive:true});
})();

// =============================================
// 週・日表示の折り返しを常時強制（MutationObserver）
// =============================================
function forceWrap(){
  const wrap = document.getElementById('cal-wrap');
  if(!wrap) return;
  wrap.querySelectorAll(
    '.fc-timegrid-event .fc-event-title, .fc-timegrid-event .fc-event-title-container, .fc-timegrid-event .fc-event-main, .fc-timegrid-event .fc-event-main-frame'
  ).forEach(el=>{
    el.style.setProperty('white-space','normal','important');
    el.style.setProperty('word-break','break-all','important');
    el.style.setProperty('overflow-wrap','anywhere','important');
    el.style.setProperty('overflow','hidden','important');
    el.style.setProperty('line-height','1.25','important');
    el.style.setProperty('font-size','10px','important');
    el.style.setProperty('font-weight','800','important');
    el.style.setProperty('min-width','0','important');
  });
}

// カレンダーの変化を監視して毎回適用
const observer = new MutationObserver(()=>{ forceWrap(); });
document.addEventListener('DOMContentLoaded', ()=>{
  const wrap = document.getElementById('cal-wrap');
  if(wrap){
    observer.observe(wrap, {childList:true, subtree:true});
  }
});

// =============================================
// 起動（全リソース読み込み完了後）
// =============================================
window.addEventListener("load", function(){
  loadData();
});
</script>
